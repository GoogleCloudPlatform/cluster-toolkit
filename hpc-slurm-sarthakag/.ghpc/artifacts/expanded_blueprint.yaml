blueprint_name: hpc-slurm
ghpc_version: v1.74.0-41-gdb8d387fd
vars:
  deployment_name: hpc-slurm-sarthakag
  labels:
    ghpc_blueprint: hpc-slurm
    ghpc_deployment: ((var.deployment_name))
  project_id: hpc-toolkit-gsc
  region: us-central1
  zone: us-central1-a
deployment_groups:
  - group: primary
    terraform_providers:
      google:
        source: hashicorp/google
        version: '>= 6.9.0, <= 7.12.0'
        configuration:
          project: ((var.project_id))
          region: ((var.region))
          zone: ((var.zone))
      google-beta:
        source: hashicorp/google-beta
        version: '>= 6.9.0, <= 7.12.0'
        configuration:
          project: ((var.project_id))
          region: ((var.region))
          zone: ((var.zone))
    modules:
      - source: modules/network/vpc
        kind: terraform
        id: network
        settings:
          deployment_name: ((var.deployment_name))
          labels: ((var.labels))
          project_id: ((var.project_id))
          region: ((var.region))
      - source: community/modules/network/private-service-access
        kind: terraform
        id: private_service_access
        use:
          - network
        settings:
          labels: ((var.labels))
          network_id: ((module.network.network_id))
          project_id: ((var.project_id))
      - source: modules/file-system/filestore
        kind: terraform
        id: homefs
        use:
          - network
          - private_service_access
        settings:
          connect_mode: ((module.private_service_access.connect_mode))
          deployment_name: ((var.deployment_name))
          labels: ((var.labels))
          local_mount: /home
          network_id: ((module.network.network_id))
          project_id: ((var.project_id))
          region: ((var.region))
          reserved_ip_range: ((module.private_service_access.reserved_ip_range))
          zone: ((var.zone))
      - source: community/modules/compute/schedmd-slurm-gcp-v6-nodeset
        kind: terraform
        id: debug_nodeset
        use:
          - network
        settings:
          allow_automatic_updates: false
          labels: ((var.labels))
          machine_type: n2-standard-2
          name: debug_nodeset
          node_count_dynamic_max: 4
          project_id: ((var.project_id))
          region: ((var.region))
          subnetwork_self_link: ((module.network.subnetwork_self_link))
          zone: ((var.zone))
      - source: community/modules/compute/schedmd-slurm-gcp-v6-partition
        kind: terraform
        id: debug_partition
        use:
          - debug_nodeset
        settings:
          exclusive: false
          is_default: true
          nodeset: ((flatten([module.debug_nodeset.nodeset])))
          partition_name: debug
      - source: community/modules/compute/schedmd-slurm-gcp-v6-nodeset
        kind: terraform
        id: compute_nodeset
        use:
          - network
        settings:
          allow_automatic_updates: false
          bandwidth_tier: gvnic_enabled
          labels: ((var.labels))
          name: compute_nodeset
          node_count_dynamic_max: 20
          project_id: ((var.project_id))
          region: ((var.region))
          subnetwork_self_link: ((module.network.subnetwork_self_link))
          zone: ((var.zone))
      - source: community/modules/compute/schedmd-slurm-gcp-v6-partition
        kind: terraform
        id: compute_partition
        use:
          - compute_nodeset
        settings:
          nodeset: ((flatten([module.compute_nodeset.nodeset])))
          partition_name: compute
      - source: community/modules/compute/schedmd-slurm-gcp-v6-nodeset
        kind: terraform
        id: h3_nodeset
        use:
          - network
        settings:
          allow_automatic_updates: false
          bandwidth_tier: gvnic_enabled
          disk_type: pd-balanced
          labels: ((var.labels))
          machine_type: h3-standard-88
          name: h3_nodeset
          node_count_dynamic_max: 20
          project_id: ((var.project_id))
          region: ((var.region))
          subnetwork_self_link: ((module.network.subnetwork_self_link))
          zone: ((var.zone))
      - source: community/modules/compute/schedmd-slurm-gcp-v6-partition
        kind: terraform
        id: h3_partition
        use:
          - h3_nodeset
        settings:
          nodeset: ((flatten([module.h3_nodeset.nodeset])))
          partition_name: h3
      - source: community/modules/scheduler/schedmd-slurm-gcp-v6-login
        kind: terraform
        id: slurm_login
        use:
          - network
        settings:
          enable_login_public_ips: true
          labels: ((var.labels))
          machine_type: n2-standard-4
          name_prefix: slurm_login
          project_id: ((var.project_id))
          region: ((var.region))
          subnetwork_self_link: ((module.network.subnetwork_self_link))
          zone: ((var.zone))
      - source: community/modules/scheduler/schedmd-slurm-gcp-v6-controller
        kind: terraform
        id: slurm_controller
        use:
          - network
          - debug_partition
          - compute_partition
          - h3_partition
          - homefs
          - slurm_login
        settings:
          deployment_name: ((var.deployment_name))
          enable_controller_public_ips: true
          labels: ((var.labels))
          login_nodes: ((flatten([module.slurm_login.login_nodes])))
          network_storage: ((flatten([module.homefs.network_storage])))
          nodeset: ((flatten([module.h3_partition.nodeset, flatten([module.compute_partition.nodeset, flatten([module.debug_partition.nodeset])])])))
          nodeset_dyn: ((flatten([module.h3_partition.nodeset_dyn, flatten([module.compute_partition.nodeset_dyn, flatten([module.debug_partition.nodeset_dyn])])])))
          nodeset_tpu: ((flatten([module.h3_partition.nodeset_tpu, flatten([module.compute_partition.nodeset_tpu, flatten([module.debug_partition.nodeset_tpu])])])))
          partitions: ((flatten([module.h3_partition.partitions, flatten([module.compute_partition.partitions, flatten([module.debug_partition.partitions])])])))
          project_id: ((var.project_id))
          region: ((var.region))
          subnetwork_self_link: ((module.network.subnetwork_self_link))
          zone: ((var.zone))
