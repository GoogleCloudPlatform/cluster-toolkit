blueprint_name: a4xhigh-slurm
ghpc_version: v1.74.0-101-g13fe9fd93-dirty
vars:
  a4x_cluster_size: 2
  a4x_reservation_name: nvidia-gb200-uyrez5en64cu7
  benchmark_dir: ((ghpc_stage("system_benchmarks")))
  build_from_image_family: ubuntu-accelerator-2404-arm64-with-nvidia-570
  build_from_image_project: ubuntu-os-accelerator-images
  build_slurm_from_git_ref: 6.10.6
  built_image_family: slurm-ubuntu2404-accelerator-arm64-64k
  deployment_name: sarthakaga4x
  disk_size_gb: 100
  filestore_ip_range: 192.168.32.0/24
  image_build_disk_type: hyperdisk-balanced
  image_build_machine_type: c4a-highcpu-16
  image_disk_size_gb: 100
  instance_image:
    family: slurm-ubuntu2404-accelerator-arm64-64k
    project: ((var.project_id))
  labels:
    ghpc_blueprint: a4xhigh-slurm
    ghpc_deployment: ((var.deployment_name))
  local_ssd_mountpoint: /mnt/localssd
  nccl_plugin_version: v1.0.6
  net0_range: 192.168.0.0/19
  net1_range: 192.168.64.0/19
  project_id: hpc-toolkit-dev
  rdma_net_range: 192.168.128.0/18
  region: us-west8
  zone: us-west8-a
deployment_groups:
  - group: image-env
    terraform_backend:
      type: gcs
      configuration:
        bucket: sarthakag-test
        prefix: (("a4xhigh-slurm/${var.deployment_name}/image-env"))
    terraform_providers:
      google:
        source: hashicorp/google
        version: '>= 6.9.0, <= 7.12.0'
        configuration:
          project: ((var.project_id))
          region: ((var.region))
          zone: ((var.zone))
      google-beta:
        source: hashicorp/google-beta
        version: '>= 6.9.0, <= 7.12.0'
        configuration:
          project: ((var.project_id))
          region: ((var.region))
          zone: ((var.zone))
    modules:
      - source: modules/network/vpc
        kind: terraform
        id: a4x-slurm-image-net
        outputs:
          - name: subnetwork_name
            description: Automatically-generated output exported for use by later deployment groups
            sensitive: true
        settings:
          deployment_name: ((var.deployment_name))
          labels: ((var.labels))
          project_id: ((var.project_id))
          region: ((var.region))
      - source: modules/scripts/startup-script
        kind: terraform
        id: slurm-build-script
        outputs:
          - name: startup_script
            description: Automatically-generated output exported for use by later deployment groups
            sensitive: true
        settings:
          deployment_name: ((var.deployment_name))
          enable_gpu_network_wait_online: true
          labels: ((var.labels))
          project_id: ((var.project_id))
          region: ((var.region))
          runners:
            - content: |
                Package: nvidia-container-toolkit nvidia-container-toolkit-base libnvidia-container-tools libnvidia-container1
                Pin: version 1.17.7-1
                Pin-Priority: 100
              destination: /etc/apt/preferences.d/block-broken-nvidia-container
              type: data
            - content: |
                ---
                - name: Hold nvidia packages
                  hosts: all
                  become: true
                  vars:
                    nvidia_packages_to_hold:
                    - libnvidia-cfg1-*-server
                    - libnvidia-compute-*-server
                    - libnvidia-nscq-*
                    - nvidia-compute-utils-*-server
                    - nvidia-fabricmanager-*
                    - nvidia-utils-*-server
                    - nvidia-imex-*
                  tasks:
                  - name: Hold nvidia packages
                    ansible.builtin.command:
                      argv:
                      - apt-mark
                      - hold
                      - "{{ item }}"
                    loop: "{{ nvidia_packages_to_hold }}"
              destination: hold-nvidia-packages.yml
              type: ansible-local
            - content: |
                ENROOT_CONFIG_PATH     ${HOME}/.enroot
              destination: /etc/enroot/enroot.conf
              type: data
            - content: |
                * - memlock unlimited
                * - nproc unlimited
                * - stack 8192
                * - nofile 1048576
                * - cpu unlimited
                * - rtprio unlimited
              destination: /etc/security/limits.d/99-unlimited.conf
              type: data
            - content: |
                ---
                - name: Update OS settings prior to Slurm install
                  hosts: all
                  become: true
                  tasks:
                  - name: Turn off username space restriction in Apparmor
                    ansible.builtin.lineinfile:
                      path: /etc/sysctl.d/20-apparmor-donotrestrict.conf
                      regexp: '^kernel.apparmor_restrict_unprivileged_userns'
                      line: kernel.apparmor_restrict_unprivileged_userns = 0
                      create: yes
                    when: ansible_distribution == "Ubuntu" and  ansible_distribution_major_version is version('23', '>=')
              destination: update_settings.yml
              type: ansible-local
            - content: |
                {
                  "reboot": false,
                  "install_ompi": true,
                  "install_lustre": false,
                  "install_gcsfuse": true,
                  "install_cuda": false,
                  "allow_kernel_upgrades": false,
                  "monitoring_agent": "cloud-ops",
                  install_managed_lustre: false,
                }
              destination: /var/tmp/slurm_vars.json
              type: data
            - content: (("#!/bin/bash\nset -e -o pipefail\nansible-pull \\\n    -U https://github.com/GoogleCloudPlatform/slurm-gcp -C ${var.build_slurm_from_git_ref} \\\n    -i localhost, --limit localhost --connection=local \\\n    -e @/var/tmp/slurm_vars.json \\\n    ansible/playbook.yml\n"))
              destination: install_slurm.sh
              type: shell
            - content: |
                ---
                - name: Install A4X Drivers and Utils
                  hosts: all
                  become: true
                  vars:
                    distribution: "{{ ansible_distribution | lower }}{{ ansible_distribution_version | replace('.','') }}"
                    cuda_repo_url: https://developer.download.nvidia.com/compute/cuda/repos/{{ distribution }}/sbsa/cuda-keyring_1.1-1_all.deb
                    cuda_repo_filename: /tmp/{{ cuda_repo_url | basename }}
                    nvidia_packages:
                    - cuda-toolkit-12-8
                    - datacenter-gpu-manager-4-cuda12
                    - datacenter-gpu-manager-4-dev
                  tasks:
                  - name: Download NVIDIA repository package
                    ansible.builtin.get_url:
                      url: "{{ cuda_repo_url }}"
                      dest: "{{ cuda_repo_filename }}"
                  - name: Install NVIDIA repository package
                    ansible.builtin.apt:
                      deb: "{{ cuda_repo_filename }}"
                      state: present
                  - name: Install NVIDIA fabric and CUDA
                    ansible.builtin.apt:
                      name: "{{ item }}"
                      update_cache: true
                      allow_downgrade: yes
                    loop: "{{ nvidia_packages }}"
                  - name: Freeze NVIDIA fabric and CUDA
                    ansible.builtin.command:
                      argv:
                      - apt-mark
                      - hold
                      - "{{ item }}"
                    loop: "{{ nvidia_packages }}"
                  - name: Create nvidia-persistenced override directory
                    ansible.builtin.file:
                      path: /etc/systemd/system/nvidia-persistenced.service.d
                      state: directory
                      owner: root
                      group: root
                      mode: 0o755
                  - name: Configure nvidia-persistenced override
                    ansible.builtin.copy:
                      dest: /etc/systemd/system/nvidia-persistenced.service.d/persistence_mode.conf
                      owner: root
                      group: root
                      mode: 0o644
                      content: |
                        [Service]
                        ExecStart=
                        ExecStart=/usr/bin/nvidia-persistenced --user nvidia-persistenced --verbose
                    notify: Reload SystemD
                  handlers:
                  - name: Reload SystemD
                    ansible.builtin.systemd:
                      daemon_reload: true
                  post_tasks:
                  - name: Disable NVIDIA DCGM by default (enable during boot on GPU nodes)
                    ansible.builtin.service:
                      name: nvidia-dcgm.service
                      state: stopped
                      enabled: false
                  - name: Disable nvidia-persistenced SystemD unit (enable during boot on GPU nodes)
                    ansible.builtin.service:
                      name: nvidia-persistenced.service
                      state: stopped
                      enabled: false
              destination: install_a4x_drivers.yml
              type: ansible-local
            - content: '(("#!/bin/bash\nBASEMETADATAURL=http://metadata.google.internal/computeMetadata/v1/instance/\nrm $(curl -f -H \"Metadata-Flavor: Google\" $${BASEMETADATAURL}/attributes/startup-script-log-dest 2> /dev/null)\ngcloud compute instances add-metadata $(hostname -s) --metadata \"startup-script-status\"=\"done\" --zone ${var.zone}\n"))'
              destination: stop_packer_early.sh
              type: shell
  - group: image
    terraform_backend:
      type: gcs
      configuration:
        bucket: sarthakag-test
        prefix: (("a4xhigh-slurm/${var.deployment_name}/image"))
    modules:
      - source: modules/packer/custom-image
        kind: packer
        id: slurm-a4xhigh-image
        use:
          - a4x-slurm-image-net
          - slurm-build-script
        settings:
          deployment_name: ((var.deployment_name))
          disk_size: ((var.image_disk_size_gb))
          disk_type: ((var.image_build_disk_type))
          image_family: ((var.built_image_family))
          labels: ((var.labels))
          machine_type: ((var.image_build_machine_type))
          metadata:
            user-data: |
              #cloud-config
              create_hostname_file: true
              write_files:
              - path: /etc/apt/apt.conf.d/20auto-upgrades
                permissions: '0644'
                owner: root
                content: |
                  APT::Periodic::Update-Package-Lists "0";
                  APT::Periodic::Unattended-Upgrade "0";
          omit_external_ip: false
          project_id: ((var.project_id))
          source_image_family: ((var.build_from_image_family))
          source_image_project_id:
            - ((var.build_from_image_project))
          startup_script: ((module.slurm-build-script.startup_script))
          subnetwork_name: ((module.a4x-slurm-image-net.subnetwork_name))
          zone: ((var.zone))
  - group: cluster-env
    terraform_backend:
      type: gcs
      configuration:
        bucket: sarthakag-test
        prefix: (("a4xhigh-slurm/${var.deployment_name}/cluster-env"))
    terraform_providers:
      google:
        source: hashicorp/google
        version: '>= 6.9.0, <= 7.12.0'
        configuration:
          project: ((var.project_id))
          region: ((var.region))
          zone: ((var.zone))
      google-beta:
        source: hashicorp/google-beta
        version: '>= 6.9.0, <= 7.12.0'
        configuration:
          project: ((var.project_id))
          region: ((var.region))
          zone: ((var.zone))
    modules:
      - source: modules/network/vpc
        kind: terraform
        id: a4x-slurm-net-0
        outputs:
          - name: subnetwork_self_link
            description: Automatically-generated output exported for use by later deployment groups
            sensitive: true
        settings:
          deployment_name: ((var.deployment_name))
          enable_internal_traffic: false
          firewall_rules:
            - allow:
                - protocol: tcp
                - protocol: udp
                - protocol: icmp
              name: (("${var.deployment_name}-internal-0"))
              ranges:
                - ((var.net0_range))
          labels: ((var.labels))
          mtu: 8896
          network_name: (("${var.deployment_name}-net-0"))
          project_id: ((var.project_id))
          region: ((var.region))
          subnetworks:
            - subnet_ip: ((var.net0_range))
              subnet_name: (("${var.deployment_name}-sub-0"))
              subnet_region: ((var.region))
      - source: modules/network/vpc
        kind: terraform
        id: a4x-slurm-net-1
        outputs:
          - name: subnetwork_self_link
            description: Automatically-generated output exported for use by later deployment groups
            sensitive: true
        settings:
          deployment_name: ((var.deployment_name))
          enable_internal_traffic: false
          firewall_rules:
            - allow:
                - protocol: tcp
                - protocol: udp
                - protocol: icmp
              name: (("${var.deployment_name}-internal-1"))
              ranges:
                - ((var.net1_range))
          labels: ((var.labels))
          mtu: 8896
          network_name: (("${var.deployment_name}-net-1"))
          project_id: ((var.project_id))
          region: ((var.region))
          subnetworks:
            - subnet_ip: ((var.net1_range))
              subnet_name: (("${var.deployment_name}-sub-1"))
              subnet_region: ((var.region))
      - source: modules/network/gpu-rdma-vpc
        kind: terraform
        id: a4x-slurm-rdma-net
        outputs:
          - name: subnetwork_interfaces
            description: Automatically-generated output exported for use by later deployment groups
            sensitive: true
        settings:
          deployment_name: ((var.deployment_name))
          network_name: (("${var.deployment_name}-rdma-net"))
          network_profile: (("https://www.googleapis.com/compute/beta/projects/${var.project_id}/global/networkProfiles/${var.zone}-vpc-roce"))
          network_routing_mode: REGIONAL
          project_id: ((var.project_id))
          region: ((var.region))
          subnetworks_template:
            count: 4
            ip_range: ((var.rdma_net_range))
            name_prefix: (("${var.deployment_name}-mrdma-sub"))
            region: ((var.region))
      - source: modules/file-system/filestore
        kind: terraform
        id: homefs
        use:
          - a4x-slurm-net-0
        outputs:
          - name: network_storage
        settings:
          deletion_protection:
            enabled: true
            reason: Avoid data loss
          deployment_name: ((var.deployment_name))
          filestore_tier: HIGH_SCALE_SSD
          labels: ((var.labels))
          local_mount: /home
          network_id: ((module.a4x-slurm-net-0.network_id))
          project_id: ((var.project_id))
          region: ((var.region))
          reserved_ip_range: ((var.filestore_ip_range))
          size_gb: 10240
          zone: ((var.zone))
      - source: modules/file-system/cloud-storage-bucket
        kind: terraform
        id: gcs_bucket
        outputs:
          - name: network_storage
            description: Automatically-generated output exported for use by later deployment groups
            sensitive: true
        settings:
          deployment_name: ((var.deployment_name))
          enable_hierarchical_namespace: true
          labels: ((var.labels))
          local_mount: /gcs
          mount_options: implicit-dirs,metadata-cache-negative-ttl-secs=0,metadata-cache-ttl-secs=-1,stat-cache-max-size-mb=-1,type-cache-max-size-mb=-1,enable-streaming-writes=true,dir-mode=777,file-mode=777,allow_other
          project_id: ((var.project_id))
          random_suffix: true
          region: ((var.region))
      - source: modules/file-system/pre-existing-network-storage
        kind: terraform
        id: gcs_checkpoints
        settings:
          fs_type: gcsfuse
          local_mount: /gcs-checkpoints
          mount_options: implicit-dirs,metadata-cache-negative-ttl-secs=0,metadata-cache-ttl-secs=-1,stat-cache-max-size-mb=-1,type-cache-max-size-mb=-1,file-cache-max-size-mb=-1,file-cache-cache-file-for-range-read=true,file-cache-enable-parallel-downloads=true,cache-dir=/mnt/localssd,enable-streaming-writes=true,dir-mode=777,file-mode=777,allow_other
          remote_mount: ((module.gcs_bucket.gcs_bucket_name))
      - source: modules/file-system/pre-existing-network-storage
        kind: terraform
        id: gcs_training_data
        settings:
          fs_type: gcsfuse
          local_mount: /gcs-training-data
          mount_options: implicit-dirs,metadata-cache-negative-ttl-secs=0,metadata-cache-ttl-secs=-1,stat-cache-max-size-mb=-1,type-cache-max-size-mb=-1,enable-streaming-writes=true,dir-mode=777,file-mode=777,allow_other
          remote_mount: ((module.gcs_bucket.gcs_bucket_name))
      - source: modules/file-system/pre-existing-network-storage
        kind: terraform
        id: gcs_model_serving
        settings:
          fs_type: gcsfuse
          local_mount: /gcs-model-serving
          mount_options: implicit-dirs,cache-dir=/mnt/localssd,metadata-cache-negative-ttl-secs=0,metadata-cache-ttl-secs=-1,stat-cache-max-size-mb=-1,type-cache-max-size-mb=-1,file-cache-max-size-mb=-1,file-cache-cache-file-for-range-read=true,file-cache-enable-parallel-downloads=true,dir-mode=777,file-mode=777,allow_other
          remote_mount: ((module.gcs_bucket.gcs_bucket_name))
      - source: modules/scripts/startup-script
        kind: terraform
        id: a4x_startup
        outputs:
          - name: startup_script
            description: Automatically-generated output exported for use by later deployment groups
            sensitive: true
        settings:
          deployment_name: ((var.deployment_name))
          docker:
            daemon_config: '(("{\n  \"data-root\": \"${var.local_ssd_mountpoint}/docker\"\n}\n"))'
            enabled: true
            world_writable: true
          labels: ((var.labels))
          local_ssd_filesystem:
            mountpoint: ((var.local_ssd_mountpoint))
            permissions: "1777"
          project_id: ((var.project_id))
          region: ((var.region))
          runners:
            - ((module.gcs_checkpoints.client_install_runner))
            - ((module.gcs_checkpoints.mount_runner))
            - ((module.gcs_training_data.client_install_runner))
            - ((module.gcs_training_data.mount_runner))
            - ((module.gcs_model_serving.client_install_runner))
            - ((module.gcs_model_serving.mount_runner))
            - content: |
                #!/bin/bash
                mkdir -p /mnt/localssd
                chmod 1777 /mnt/localssd
              destination: ensure_mnt_localssd_permissions.sh
              type: shell
            - content: |
                #!/bin/bash
                hostname -s | sudo tee /etc/hostname > /dev/null
              destination: ensure_etc_hostname_created.sh
              type: shell
            - content: |
                optional /usr/lib/aarch64-linux-gnu/slurm/spank_pyxis.so
              destination: /etc/slurm/plugstack.conf.d/pyxis.conf
              type: data
            - content: (("ENROOT_CONFIG_PATH     $${HOME}/.enroot\nENROOT_RUNTIME_PATH    ${var.local_ssd_mountpoint}/$${UID}/enroot/runtime\nENROOT_CACHE_PATH      ${var.local_ssd_mountpoint}/$${UID}/enroot/cache\nENROOT_DATA_PATH       ${var.local_ssd_mountpoint}/$${UID}/enroot/data\nENROOT_TEMP_PATH       ${var.local_ssd_mountpoint}/$${UID}/enroot\n"))
              destination: /etc/enroot/enroot.conf
              type: data
            - content: '(("---\n- name: Install NCCL plugin for A4X series\n  hosts: all\n  become: true\n  tasks:\n  - name: Add SystemD unit for NCCL plugin installation\n    ansible.builtin.copy:\n      dest: /etc/systemd/system/nccl-plugin@${var.nccl_plugin_version}.service\n      mode: 0o0644\n      content: |\n        [Unit]\n        After=network-online.target docker.service\n        Before=slurmd.service\n        Requires=docker.service\n\n        [Service]\n        Type=oneshot\n        ExecStartPre=/usr/bin/rm -rf /usr/local/gib\n        ExecStartPre=/usr/bin/mkdir -p /usr/local/gib\n        ExecStartPre=/snap/bin/gcloud auth configure-docker --quiet us-docker.pkg.dev\n        ExecStart=/usr/bin/docker run --rm --name nccl-gib-installer --volume /usr/local/gib:/var/lib/gib \\\n            us-docker.pkg.dev/gce-ai-infra/gpudirect-gib/nccl-plugin-gib-arm64:latest install --install-nccl\n        ExecStartPost=/usr/bin/chmod -R a+r /usr/local/gib\n\n        [Install]\n        WantedBy=slurmd.service\n    notify:\n    - Reload SystemD\n  handlers:\n  - name: Reload SystemD\n    ansible.builtin.systemd:\n      daemon_reload: true\n  post_tasks:\n  - name: Enable NCCL plugin SystemD unit\n    ansible.builtin.service:\n      name: nccl-plugin@${var.nccl_plugin_version}.service\n      state: started\n      enabled: true\n"))'
              destination: nccl_plugin.yml
              type: ansible-local
            - content: |
                ---
                - name: Enable NVIDIA DCGM on GPU nodes
                  hosts: all
                  become: true
                  vars:
                    enable_ops_agent: true
                    enable_nvidia_dcgm: true
                  tasks:
                  - name: Update Ops Agent configuration
                    ansible.builtin.blockinfile:
                      path: /etc/google-cloud-ops-agent/config.yaml
                      insertafter: EOF
                      block: |
                        metrics:
                          receivers:
                            dcgm:
                              type: dcgm
                          service:
                            pipelines:
                              dcgm:
                                receivers:
                                  - dcgm
                    notify:
                    - Restart Google Cloud Ops Agent
                  handlers:
                  - name: Restart Google Cloud Ops Agent
                    ansible.builtin.service:
                      name: google-cloud-ops-agent.service
                      state: "{{ 'restarted' if enable_ops_agent else 'stopped' }}"
                      enabled: "{{ enable_ops_agent }}"
                  post_tasks:
                  - name: Enable Google Cloud Ops Agent
                    ansible.builtin.service:
                      name: google-cloud-ops-agent.service
                      state: "{{ 'started' if enable_ops_agent else 'stopped' }}"
                      enabled: "{{ enable_ops_agent }}"
                  - name: Enable NVIDIA DCGM
                    ansible.builtin.service:
                      name: nvidia-dcgm.service
                      state: "{{ 'started' if enable_nvidia_dcgm else 'stopped' }}"
                      enabled: "{{ enable_nvidia_dcgm }}"
                  # Enable persistenced service
                  - name: Enable nvidia-persistenced
                    ansible.builtin.service:
                      name: nvidia-persistenced.service
                      state: started
                      enabled: true
              destination: enable_dcgm.yml
              type: ansible-local
  - group: cluster
    terraform_backend:
      type: gcs
      configuration:
        bucket: sarthakag-test
        prefix: (("a4xhigh-slurm/${var.deployment_name}/cluster"))
    terraform_providers:
      google:
        source: hashicorp/google
        version: '>= 6.9.0, <= 7.12.0'
        configuration:
          project: ((var.project_id))
          region: ((var.region))
          zone: ((var.zone))
      google-beta:
        source: hashicorp/google-beta
        version: '>= 6.9.0, <= 7.12.0'
        configuration:
          project: ((var.project_id))
          region: ((var.region))
          zone: ((var.zone))
    modules:
      - source: community/modules/compute/schedmd-slurm-gcp-v6-nodeset
        kind: terraform
        id: a4x_nodeset
        use:
          - a4x-slurm-net-0
          - a4x_startup
        settings:
          accelerator_topology: 1x72
          additional_networks: ((concat([{ network = null, subnetwork = module.a4x-slurm-net-1.subnetwork_self_link, subnetwork_project = var.project_id, nic_type = "GVNIC", queue_count = null, network_ip = "", stack_type = null, access_config = [], ipv6_access_config = [], alias_ip_range = [] }], module.a4x-slurm-rdma-net.subnetwork_interfaces)))
          advanced_machine_features:
            threads_per_core: null
          bandwidth_tier: gvnic_enabled
          disk_size_gb: ((var.disk_size_gb))
          disk_type: hyperdisk-balanced
          enable_placement: true
          enable_public_ips: true
          instance_image: ((var.instance_image))
          instance_image_custom: true
          labels: ((var.labels))
          machine_type: a4x-highgpu-4g
          name: a4x_nodeset
          node_conf:
            CoresPerSocket: 70
            SocketsPerBoard: 2
            ThreadsPerCore: 1
          node_count_dynamic_max: 0
          node_count_static: ((var.a4x_cluster_size))
          on_host_maintenance: TERMINATE
          project_id: ((var.project_id))
          region: ((var.region))
          reservation_name: ((var.a4x_reservation_name))
          startup_script: ((module.a4x_startup.startup_script))
          subnetwork_self_link: ((module.a4x-slurm-net-0.subnetwork_self_link))
          zone: ((var.zone))
