apiVersion: batch/v1
kind: Job
metadata:
  name: g4-verification-test
  namespace: default
spec:
  template:
    metadata:
      labels:
        name: g4-verification-test
    spec:
      restartPolicy: Never
      nodeSelector:
        cloud.google.com/gke-nodepool: g4-standard-48-g4-pool
      tolerations:
      - key: "nvidia.com/gpu"
        operator: "Exists"
        effect: "NoSchedule"
      containers:
      - name: gpu-verification
        image: nvcr.io/nvidia/pytorch:24.01-py3
        securityContext:
          privileged: true  # Required to read host dmesg for AMD SEV verification
        command: ["bash", "-c"]
        args:
        - |
          echo "=== 1. CPU SEV Status (dmesg) ==="
          dmesg | grep -i "Encryption Features active" || echo "dmesg check failed"

          echo "=== 2. GPU CC Status (nvidia-smi) ==="
          nvidia-smi conf-compute -f || echo "nvidia-smi conf-compute -f failed"
          nvidia-smi conf-compute -grs || echo "nvidia-smi conf-compute -grs failed"

          echo "=== 3. Running GPU Computation Workload ==="
          python3 -c '
          import torch
          print("PyTorch Version:", torch.__version__)
          print("CUDA Available:", torch.cuda.is_available())
          if not torch.cuda.is_available():
              print("ERROR: CUDA not available!")
              exit(1)

          device = torch.device("cuda")
          print("Device Name:", torch.cuda.get_device_name(0))

          print("Initializing tensors on host CPU...")
          a = torch.randn(10000, 10000)
          b = torch.randn(10000, 10000)

          print("Moving tensors to GPU (Encrypted Secure Passthrough transfer)...")
          a_gpu = a.to(device)
          b_gpu = b.to(device)

          print("Performing matrix multiplication on GPU...")
          c_gpu = torch.matmul(a_gpu, b_gpu)

          print("Moving result back to CPU...")
          c = c_gpu.to("cpu")

          print("Sanity check result sum:", c.sum().item())
          print("SUCCESS: G4 GPU computation completed successfully!")
          '
        resources:
          limits:
            nvidia.com/gpu: 1
