---

blueprint_name: a4x-jbvm
vars:
  project_id:
  deployment_name: a4x-vm
  region: us-central1
  zone: us-central1-b 
  machine_type: 'a4x-highgpu-4g' 
  hostname_prefix: $(vars.deployment_name)-lavek
  instance_count: 2
  instance_image:
    project: ubuntu-os-accelerator-images
    family: ubuntu-accelerator-2404-arm64-with-nvidia-580
  filestore_ip_range: 192.168.32.0/24
  disk_size_gb: 100
  reservation_name: 
deployment_groups:
- group: primary
  modules:
  - id: a4x_net_0
    source: modules/network/vpc
    settings:
      network_name: $(vars.deployment_name)-a4x-net-0
      allowed_ssh_ip_ranges: [0.0.0.0/0]
      mtu: 8896
      subnetworks:
      - subnet_name: $(vars.deployment_name)-a4x-sub-0
        subnet_region: $(vars.region)
        subnet_ip: 192.168.0.0/24
      firewall_rules:
      - name: $(vars.deployment_name)-a4x-internal-0
        ranges: [192.168.0.0/16]
        allow:
        - protocol: tcp
          ports: ["0-65535"]
        - protocol: udp
          ports: ["0-65535"]
        - protocol: icmp
  - id: a4x_net_1
    source: modules/network/vpc
    settings:
      network_name: $(vars.deployment_name)-a4x-net-1
      mtu: 8896
      subnetworks:
      - subnet_name: $(vars.deployment_name)-a4x-sub-1
        subnet_region: $(vars.region)
        subnet_ip: 192.168.1.0/24
      firewall_rules:
      - name: $(vars.deployment_name)-a4x-internal-1
        ranges: [192.168.0.0/16]
        allow:
        - protocol: tcp
          ports: ["0-65535"]
        - protocol: udp
          ports: ["0-65535"]
        - protocol: icmp
  - id: a4x_rdma_net
    source: modules/network/gpu-rdma-vpc
    settings:
      mtu: 8896
      network_name: $(vars.deployment_name)-a4x-rdma-net
      network_profile: https://www.googleapis.com/compute/beta/projects/$(vars.project_id)/global/networkProfiles/$(vars.zone)-vpc-roce
      network_routing_mode: REGIONAL
      subnetworks_template:
        name_prefix: a4x-mrdma-sub
        count: 4
        ip_range: 192.168.128.0/24
        region: $(vars.region)

  - id: startup-script
    source: modules/scripts/startup-script
    settings:
     # Install ansible
      install_ansible: true
      runners:
      # Install nvidia drivers/utilities
      - type: ansible-local
        destination: install_nvidia_drivers.yml
        content: |
          # ---
          - name: Install NVIDIA Drivers and Utils
            hosts: all
            become: true
            vars:
              distribution: "{{ ansible_distribution | lower }}{{ ansible_distribution_version | replace('.','') }}"
              cuda_repo_url: https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/sbsa/cuda-keyring_1.1-1_all.deb
              #https://developer.download.nvidia.com/compute/cuda/repos/{{ distribution }}/sbsa/cuda-keyring_1.1-1_all.deb
              cuda_repo_filename: /tmp/{{ cuda_repo_url | basename }}
              enable_nvidia_dcgm: false
              nvidia_packages:
              - nvidia-container-toolkit
              - cuda-toolkit-13
              - datacenter-gpu-manager-4-cuda13
            tasks:
            # Download the NVIDIA repo
            - name: Download NVIDIA repository package
              ansible.builtin.get_url:
                url: "{{ cuda_repo_url }}"
                dest: "{{ cuda_repo_filename }}"

            # Install the NVIDIA repo
            - name: Install NVIDIA repository package
              ansible.builtin.apt:
                deb: "{{ cuda_repo_filename }}"
                state: present

            # Update apt cache
            - name: Update apt cache
              ansible.builtin.apt:
                update_cache: true

            # Install the package
            - name: Install NVIDIA fabric and CUDA
              ansible.builtin.apt:
                name: "{{ item }}"
              loop: "{{ nvidia_packages }}"

            # This section will optionally freeze the packages with
            # an apt-mark hold.
            - name: Freeze NVIDIA fabric and CUDA
              ansible.builtin.dpkg_selections:
                name: "{{ item }}"
                selection: hold
              loop: "{{ nvidia_packages }}"

            post_tasks:
            - name: Enable NVIDIA DCGM by default
              ansible.builtin.service:
                name: nvidia-dcgm.service
                state: started
                enabled: true

      # Install ibverbs-utils
      - type: ansible-local
        destination: install_ibverbs_packages.yml
        content: |
          ---
          - name: Install ibverbs-utils
            hosts: all
            become: true
            tasks:
            - name: Install ibverbs
              ansible.builtin.package:
                name:
                - ibverbs-utils
                state: present

      # Install OpenMPI from source.
      - type: shell
        destination: install_openmpi.sh
        content: |
          #!/bin/bash
          set -e -o pipefail
          export DEBIAN_FRONTEND=noninteractive

          mkdir -p /opt/src
          cd /opt/src

          wget https://download.open-mpi.org/release/open-mpi/v5.0/openmpi-5.0.8.tar.bz2
          tar -xvf openmpi-5.0.8.tar.bz2
          cd openmpi-5.0.8
          ./configure --with-cuda=/usr/local/cuda-13/targets/sbsa-linux
          make -j
          make install
          cd ../
          rm -rf openmpi*


      # Install NCCL
      - type: ansible-local
        destination: install_nccl.yml
        content: |
          ---
          - name: Install NCCL
            hosts: all
            become: true
            tasks:
            - name: Install Linux Modules Extra
              ansible.builtin.package:
                name:
                - libnccl2
                - libnccl-dev
                state: present

      # Install NCCL-GIB network plugin as per nccl-gib specification for a4x
      - type: ansible-local
        destination: install_nccl_gib.yml
        content: |
          ---
          - name: Install Google NCCL-GIB Plugin
            hosts: localhost
            become: true
            tasks:
            - name: Add artifact registry gpg key
              ansible.builtin.apt_key:
                url: https://us-apt.pkg.dev/doc/repo-signing-key.gpg
                state: present
            - name: Add artifact registry gpg key
              ansible.builtin.apt_key:
                url: https://packages.cloud.google.com/apt/doc/apt-key.gpg
                state: present
            - name: Install Apt Transport AR Apt Repo
              apt_repository:
                repo: 'deb http://packages.cloud.google.com/apt apt-transport-artifact-registry-stable main'
                state: present
            - name: Install AR transport
              ansible.builtin.apt:
                name: "apt-transport-artifact-registry"
                update_cache: true
            - name: Install Google NCCL-GIB Plugin
              apt_repository:
                repo: "deb ar+https://us-apt.pkg.dev/projects/gce-ai-infra gpudirect-gib-apt main"
                state: present
            - name: Install NCCL-GIB Plugin
              ansible.builtin.apt:
                name: "nccl-gib"
                update_cache: true
            - name: Freeze NCCL GIB Plugin
              ansible.builtin.dpkg_selections:
                name: "nccl-gib"
                selection: hold

      # Good to update ldconfig towards the end.
      - type: ansible-local
        destination: update_ldconfig.yml
        content: |
          ---
          - name: Update ldconfig
            hosts: localhost
            become: true
            tasks:
            - name: Configure ldconfig
              ansible.builtin.command: /usr/sbin/ldconfig

      # Install linux-modules
      - type: ansible-local
        destination: install_linux_modules.yml
        content: |
          ---
          - name: Install linux modules
            hosts: all
            become: true
            tasks:
            - name: Install linux modules
              ansible.builtin.package:
                name:
                - "linux-modules-{{ ansible_kernel }}"
                state: present

  - id: homefs
    source: modules/file-system/filestore
    use: [a4x_net_0]
    settings:
      filestore_tier: HIGH_SCALE_SSD
      size_gb: 10240
      local_mount: /home
      reserved_ip_range: $(vars.filestore_ip_range)
    outputs:
    - network_storage
    
  - id: a4x_vms
    source: modules/compute/vm-instance
    use: [startup-script,homefs]
    settings:
      machine_type: $(vars.machine_type)
      instance_count: $(vars.instance_count)
      reservation_name : $(vars.reservation_name)
      name_prefix: $(vars.deployment_name)
      placement_policy:
        collocation: COLLOCATED
      disk_type: hyperdisk-balanced
      disk_size_gb: 100
      automatic_restart: true
      on_host_maintenance: TERMINATE
      network_interfaces:
        $(concat(
          [{
            network=null,
            subnetwork=a4x_net_0.subnetwork_self_link,
            subnetwork_project=vars.project_id,
            nic_type="GVNIC",
            queue_count=null,
            network_ip=null,
            stack_type=null,
            access_config=[{nat_ip=null, public_ptr_domain_name=null, network_tier=null}],
            ipv6_access_config=[],
            alias_ip_range=[]
          },
          {
            network=null,
            subnetwork=a4x_net_1.subnetwork_self_link,
            subnetwork_project=vars.project_id,
            nic_type="GVNIC",
            queue_count=null,
            network_ip=null,
            stack_type=null,
            access_config=[{nat_ip=null, public_ptr_domain_name=null, network_tier=null}],
            ipv6_access_config=[],
            alias_ip_range=[]
          }],
          a4x_rdma_net.subnetwork_interfaces
        ))

  - id: wait-for-vms
    source: community/modules/scripts/wait-for-startup
    settings:
      instance_names: $(a4x_vms.name)
      timeout: 7200