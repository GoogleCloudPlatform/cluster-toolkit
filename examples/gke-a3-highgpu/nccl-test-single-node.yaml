apiVersion: v1
kind: Pod
metadata:
  name: nccl-test-single-node
  namespace: default
  labels:
    name: nccl-test
    kueue.x-k8s.io/queue-name: a3-high
  annotations:
    networking.gke.io/default-interface: 'eth0'
    networking.gke.io/interfaces: |
      [
        {"interfaceName":"eth0","network":"default"},
        {"interfaceName":"eth1","network":"vpc1"},
        {"interfaceName":"eth2","network":"vpc2"},
        {"interfaceName":"eth3","network":"vpc3"},
        {"interfaceName":"eth4","network":"vpc4"}
      ]
    devices.gke.io/container.tcpx-daemon: |+
      - path: /dev/nvidia0
      - path: /dev/nvidia1
      - path: /dev/nvidia2
      - path: /dev/nvidia3
      - path: /dev/nvidia4
      - path: /dev/nvidia5
      - path: /dev/nvidia6
      - path: /dev/nvidia7
      - path: /dev/nvidiactl
      - path: /dev/nvidia-uvm
spec:
  setHostnameAsFQDN: true
  restartPolicy: Never
  nodeSelector:
    cloud.google.com/gke-accelerator: nvidia-h100-80gb
  tolerations:
  - key: "nvidia.com/gpu"
    operator: "Exists"
    effect: "NoSchedule"
  containers:
  - name: tcpx-daemon
    image: us-docker.pkg.dev/gce-ai-infra/gpudirect-tcpx/tcpgpudmarxd-dev:v2.0.12
    command: ["/tcpgpudmarxd/build/app/tcpgpudmarxd"]
    args:
    - "--gpu_nic_preset"
    - "a3vm"
    - "--gpu_shmem_type"
    - "fd"
    - "--uds_path"
    - "/run/tcpx"
    - "--setup_param"
    - "--verbose 128 2 0 "
    securityContext:
      privileged: true
    volumeMounts:
    - name: libraries
      mountPath: /usr/local/nvidia/lib64
    - name: tcpx-socket
      mountPath: /run/tcpx
    - name: sys
      mountPath: /hostsysfs
    - name: proc
      mountPath: /hostprocsysfs
    env:
    - name: LD_LIBRARY_PATH
      value: /usr/local/nvidia/lib64
  - name: nccl-test
    image: us-docker.pkg.dev/gce-ai-infra/gpudirect-tcpx/nccl-plugin-gpudirecttcpx-dev:v3.1.9
    command: ["bash", "-c"]
    args:
    - |
      # A3 High Routing Logic
      for i in {1..4}; do
        INTF="eth$i"
        IP=$(ip -4 addr show $INTF | grep -oP '(?<=inet\s)\d+(\.\d+){3}')
        if [[ -n "$IP" ]]; then
          SUBNET=$(echo $IP | cut -d'.' -f1-3).0/24
          ip route add $SUBNET dev $INTF proto kernel scope link src $IP || true
        fi
      done

      echo "Running local 8-GPU NCCL test..."
      export LD_LIBRARY_PATH=/usr/local/nvidia/lib64
      export NCCL_GPUDIRECTTCPX_FORCE_ACK=0
      export NCCL_GPUDIRECTTCPX_TX_COMPLETION_NANOSLEEP=1000
      export NCCL_SOCKET_IFNAME=eth0
      export NCCL_DYNAMIC_CHUNK_SIZE=524288
      export NCCL_P2P_NET_CHUNKSIZE=524288
      export NCCL_P2P_PCI_CHUNKSIZE=524288
      export NCCL_P2P_NVL_CHUNKSIZE=1048576
      export NCCL_GPUDIRECTTCPX_TX_BINDINGS="eth1:8-21,112-125;eth2:8-21,112-125;eth3:60-73,164-177;eth4:60-73,164-177"
      export NCCL_GPUDIRECTTCPX_RX_BINDINGS="eth1:22-35,124-139;eth2:22-35,124-139;eth3:74-87,178-191;eth4:74-87,178-191"
      export NCCL_NSOCKS_PERTHREAD=4
      export NCCL_SOCKET_NTHREADS=1
      export NCCL_MAX_NCHANNELS=8
      export NCCL_MIN_NCHANNELS=8
      export NCCL_BUFFSIZE=4194304
      export NCCL_DEBUG=INFO
      export NCCL_DEBUG_SUBSYS=ENV
      export NCCL_GPUDIRECTTCPX_SOCKET_IFNAME=eth1,eth2,eth3,eth4
      export NCCL_GPUDIRECTTCPX_CTRL_DEV=eth0
      export NCCL_GPUDIRECTTCPX_PROGRAM_FLOW_STEERING_WAIT_MICROS=500000
      export NCCL_CROSS_NIC=0
      export NCCL_ALGO=Ring
      export NCCL_PROTO=Simple
      export NCCL_NET_GDR_LEVEL=PIX
      export NCCL_P2P_PXN_LEVEL=0

      # Run the benchmark
      taskset -c 0-7,104-111,52-59,156-163 /third_party/nccl-tests-mpi/build/all_reduce_perf -b 1G -e 8G -f 2 -g 8 -w 5 --iters 100 -c 0 2>&1 | tee /tmp/nccl_results.txt

      echo "Test complete. Sleeping infinity for log review."
      sleep infinity
    env:
    - name: LD_LIBRARY_PATH
      value: /usr/local/nvidia/lib64
    securityContext:
      privileged: true
    volumeMounts:
    - name: tcpx-socket
      mountPath: /run/tcpx
    - name: tcpx-socket
      mountPath: /tmp
    - name: libraries
      mountPath: /usr/local/nvidia/lib64
    resources:
      limits:
        nvidia.com/gpu: 8
      requests:
        nvidia.com/gpu: 8
  volumes:
  - name: libraries
    hostPath:
      path: /home/kubernetes/bin/nvidia/lib64
  - name: tcpx-socket
    hostPath:
      path: /run/tcpx
  - name: sys
    hostPath:
      path: /sys
  - name: proc
    hostPath:
      path: /proc/sys
