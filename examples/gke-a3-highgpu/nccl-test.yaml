apiVersion: jobset.x-k8s.io/v1alpha2
kind: JobSet
metadata:
  name: nccl-test
  namespace: default
  labels:
    kueue.x-k8s.io/queue-name: a3-high
spec:
  network:
    enableDNSHostnames: true
  replicatedJobs:
  - name: worker
    replicas: 1
    template:
      spec:
        parallelism: 1
        completions: 1
        backoffLimit: 0
        template:
          metadata:
            labels:
              name: nccl-test
            annotations:
              networking.gke.io/default-interface: 'eth0'
              networking.gke.io/interfaces: |
                [
                  {"interfaceName":"eth0","network":"default"},
                  {"interfaceName":"eth1","network":"vpc1"},
                  {"interfaceName":"eth2","network":"vpc2"},
                  {"interfaceName":"eth3","network":"vpc3"},
                  {"interfaceName":"eth4","network":"vpc4"}
                ]
              devices.gke.io/container.tcpx-daemon: |+
                - path: /dev/nvidia0
                - path: /dev/nvidia1
                - path: /dev/nvidia2
                - path: /dev/nvidia3
                - path: /dev/nvidia4
                - path: /dev/nvidia5
                - path: /dev/nvidia6
                - path: /dev/nvidia7
                - path: /dev/nvidiactl
                - path: /dev/nvidia-uvm
          spec:
            setHostnameAsFQDN: true
            restartPolicy: Never
            nodeSelector:
              cloud.google.com/gke-accelerator: nvidia-h100-80gb
            tolerations:
            - key: "nvidia.com/gpu"
              operator: "Exists"
              effect: "NoSchedule"
            containers:
            - name: tcpx-daemon
              image: us-docker.pkg.dev/gce-ai-infra/gpudirect-tcpx/tcpgpudmarxd-dev:v2.0.12
              command: ["/tcpgpudmarxd/build/app/tcpgpudmarxd"]
              args:
              - "--gpu_nic_preset"
              - "a3vm"
              - "--gpu_shmem_type"
              - "fd"
              - "--uds_path"
              - "/run/tcpx"
              - "--setup_param"
              - "--verbose 128 2 0 "
              securityContext:
                privileged: true
              volumeMounts:
              - name: libraries
                mountPath: /usr/local/nvidia/lib64
              - name: tcpx-socket
                mountPath: /run/tcpx
              - name: sys
                mountPath: /hostsysfs
              - name: proc
                mountPath: /hostprocsysfs
              env:
              - name: LD_LIBRARY_PATH
                value: /usr/local/nvidia/lib64
            - name: nccl-test
              image: us-docker.pkg.dev/gce-ai-infra/gpudirect-tcpx/nccl-plugin-gpudirecttcpx-dev:v3.1.9
              command: ["bash", "-c"]
              args:
              - |
                mkdir -p /root/.ssh
                echo "StrictHostKeyChecking no" >> /root/.ssh/config
                service ssh restart;

                # A3 High Routing Logic
                for i in {1..4}; do
                  INTF="eth$i"
                  IP=$(ip -4 addr show $INTF | grep -oP '(?<=inet\s)\d+(\.\d+){3}')
                  if [[ -n "$IP" ]]; then
                    SUBNET=$(echo $IP | cut -d'.' -f1-3).0/24
                    ip route add $SUBNET dev $INTF proto kernel scope link src $IP || true
                  fi
                done

                # Wait for both pods to be ready and known via DNS
                # JobSet provides predictable DNS names: ${JOBSET_NAME}-${REPLICATED_JOB_NAME}-${JOB_INDEX}-${POD_INDEX}
                # nccl-test-worker-0-0 and nccl-test-worker-0-1
                if [[ $REPLICATED_JOB_NAME == "worker" && $JOB_COMPLETION_INDEX == 0 ]]; then
                  until getent hosts nccl-test-worker-0-1.nccl-test; do sleep 2; done
                  /configs/allgather.sh nccl-test-worker-0-0.nccl-test nccl-test-worker-0-1.nccl-test
                else
                  sleep infinity
                fi
              env:
              - name: LD_LIBRARY_PATH
                value: /usr/local/nvidia/lib64
              securityContext:
                privileged: true
              volumeMounts:
              - name: tcpx-socket
                mountPath: /tmp
              - name: libraries
                mountPath: /usr/local/nvidia/lib64
              - name: config-volume
                mountPath: /configs
              resources:
                limits:
                  nvidia.com/gpu: 8
            volumes:
            - name: config-volume
              configMap:
                name: nccl-configmap
                defaultMode: 0777
            - name: libraries
              hostPath:
                path: /home/kubernetes/bin/nvidia/lib64
            - name: tcpx-socket
              hostPath:
                path: /run/tcpx
            - name: sys
              hostPath:
                path: /sys
            - name: proc
              hostPath:
                path: /proc/sys
