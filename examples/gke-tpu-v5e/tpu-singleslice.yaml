# The following workload runs a JAX TPU test on a single-slice (single-host) TPU v5e node.
# It checks how many TPU chips JAX can detect on the host.

apiVersion: batch/v1
kind: Job
metadata:
  name: tpu-singleslice-job
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      nodeSelector:
        cloud.google.com/gke-tpu-accelerator: tpu-v5-lite-podslice
        cloud.google.com/gke-tpu-topology: 2x2
      containers:
      - name: jax-tpu
        image: us-docker.pkg.dev/cloud-tpu-images/jax-ai-image/tpu:latest
        ports:
        - containerPort: 8471
        - containerPort: 8080
        - containerPort: 8431
        securityContext:
          privileged: true
        command:
        - bash
        - -c
        - |
          python -c 'import jax; print("Global device count:", jax.device_count())'
          sleep 60
        resources:
          limits:
            google.com/tpu: 4
          requests:
            google.com/tpu: 4
