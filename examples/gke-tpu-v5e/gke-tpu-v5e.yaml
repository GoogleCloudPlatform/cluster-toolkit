blueprint_name: gke-tpu-v5e

vars:
  # The following variables should be over-written in the deployment.yaml file.
  # Your GCP Project ID
  project_id:

  # This should be unique across all of your Cluster
  # Toolkit Deployments.
  deployment_name: gke-tpu-v5e

  # The GCP Region used for this deployment.
  region:

  # The GCP Zone used for this deployment.
  zone:

  # The number of TPU slices to create
  num_slices:

  # Machine type
  # TPU v5e options: ct5lp-hightpu-1t, ct5lp-hightpu-4t, ct5lp-hightpu-8t
  machine_type: ct5lp-hightpu-4t

  # The TPU placement topology for pod slice node pool.
  tpu_topology:

  # Cidr block containing the IP of the machine calling terraform.
  # To allow all (IAM restrictions still enforced), use 0.0.0.0/0
  # To allow only your IP address, use <YOUR-IP-ADDRESS>/32
  authorized_cidr:

  # The name of the compute engine reservation of TPU v5e nodes
  reservation:

  system_node_pool_disk_size_gb: 200
  v5e_node_pool_disk_size_gb: 100

  # Accelerator type for Kueue configuration
  accelerator_type: tpu-v5-lite-podslice

  # Kueue configuration
  kueue_configuration_path: $(ghpc_stage("./kueue-configuration.yaml.tftpl"))

  # The namespace to be configured for running workloads
  user_namespace: default


deployment_groups:
- group: primary
  modules:
  - id: gke-tpu-v5e-net
    source: modules/network/vpc
    settings:
      subnetworks:
      - subnet_name: $(vars.deployment_name)-sub-0
        subnet_region: $(vars.region)
        subnet_ip: 192.168.0.0/18
      secondary_ranges_list:
      - subnetwork_name: $(vars.deployment_name)-sub-0
        ranges:
        - range_name: pods
          ip_cidr_range: 10.4.0.0/14
        - range_name: services
          ip_cidr_range: 10.0.32.0/20
      firewall_rules:
      - name: $(vars.deployment_name)-internal-0
        ranges: [192.168.0.0/18]
        allow:
        - protocol: tcp
          ports: ["0-65535"]
        - protocol: udp
          ports: ["0-65535"]
        - protocol: icmp

  - id: node_pool_service_account
    source: modules/project/service-account
    settings:
      name: gke-np-sa
      project_roles:
      - logging.logWriter
      - monitoring.metricWriter
      - monitoring.viewer
      - stackdriver.resourceMetadata.writer
      - storage.objectViewer
      - artifactregistry.reader

  - id: workload_service_account
    source: modules/project/service-account
    settings:
      name: gke-wl-sa
      project_roles:
      - logging.logWriter
      - monitoring.metricWriter
      - monitoring.viewer
      - stackdriver.resourceMetadata.writer
      - storage.admin
      - artifactregistry.reader
      - container.admin
      - hypercomputecluster.editor

  - id: gke-tpu-v5e-cluster
    source: modules/scheduler/gke-cluster
    use: [gke-tpu-v5e-net, workload_service_account]
    settings:
      system_node_pool_machine_type: "n2-standard-8"
      system_node_pool_disk_size_gb: $(vars.system_node_pool_disk_size_gb)
      system_node_pool_taints: []
      enable_private_endpoint: false # Allows access from authorized public IPs
      configure_workload_identity_sa: true
      namespace: $(vars.user_namespace)
      enable_ml_diagnostics: true
      master_authorized_networks:
      - cidr_block: $(vars.authorized_cidr) # Allows your machine to run the kubectl command. Required for multi network setup.
        display_name: "kubectl-access-network"
      # Cluster versions cannot be updated through the toolkit after creation
      # Please manage cluster version from the Google Cloud Console directly
      version_prefix: "1.35."
      release_channel: REGULAR
      maintenance_exclusions:
      - name: no-minor-or-node-upgrades-indefinite
        start_time: "2025-12-01T00:00:00Z"
        exclusion_scope: NO_MINOR_OR_NODE_UPGRADES
        exclusion_end_time_behavior: UNTIL_END_OF_SUPPORT
    outputs: [instructions]

  - id: gke-tpu-v5e-pool
    source: modules/compute/gke-node-pool
    use: [gke-tpu-v5e-cluster, node_pool_service_account]
    settings:
      num_slices: $(vars.num_slices)
      name: gke-tpu-v5e-pool
      disk_type: pd-balanced
      machine_type: $(vars.machine_type)
      auto_upgrade: true
      zones: [$(vars.zone)]
      disk_size_gb: $(vars.v5e_node_pool_disk_size_gb)
      reservation_affinity:
        consume_reservation_type: SPECIFIC_RESERVATION
        specific_reservations:
        - name: $(vars.reservation)
      placement_policy:
        type: COMPACT
        tpu_topology: $(vars.tpu_topology)
    outputs: [instructions]

  - id: workload-manager-install
    source: modules/management/kubectl-apply
    use: [gke-tpu-v5e-cluster]
    settings:
      kueue:
        install: true
        config_path: $(vars.kueue_configuration_path)
        config_template_vars:
          tpu_quota: $(vars.num_slices * gke-tpu-v5e-pool.node_count_static * gke-tpu-v5e-pool.tpu_chips_per_node)
          accelerator_type: $(vars.accelerator_type)
          namespace: $(vars.user_namespace)
      jobset:
        install: true
      cert_manager:
        install: true
