terraform_backend_defaults:
  type: gcs
  configuration:
    # The GCS bucket used for storing terraform state
    bucket:

vars:
  # Your GCP Project ID
  project_id:

  # This should be unique across all of your Cluster
  # Toolkit Deployments.
  deployment_name: gke-tpu-v5e

  # The GCP Region used for this deployment.
  # example: us-west4
  region:

  # The GCP Zone used for this deployment.
  # example: us-west4-a
  zone:

  # The number of TPU slices to create
  num_slices:

  # Machine type
  # TPU v5e options: ct5lp-hightpu-1t, ct5lp-hightpu-4t, ct5lp-hightpu-8t
  machine_type:

  # The TPU placement topology for pod slice node pool.
  # ct5lp-hightpu-8t is exactly 8 chips (2x4 topology).
  tpu_topology:

  # Cidr block containing the IP of the machine calling terraform.
  # To allow all (IAM restrictions still enforced), use 0.0.0.0/0
  # To allow only your IP address, use <YOUR-IP-ADDRESS>/32
  authorized_cidr:

  # The name of the compute engine reservation of TPU v5e nodes
  reservation:

  # The namespace to be configured for running workloads
  user_namespace: default
