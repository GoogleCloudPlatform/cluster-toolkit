apiVersion: v1
kind: Service
metadata:
  name: tpu-discovery-service
  namespace: diagon ## namespace
spec:
  clusterIP: None
  selector:
    jobset.sigs.k8s.io/jobset-name: multi-host-tpu-v6e-jobset
---
apiVersion: jobset.x-k8s.io/v1alpha2
kind: JobSet
metadata:
  name: multi-host-tpu-v6e-jobset
  namespace: diagon ## namespace
  labels:
    diagon-enabled: "true"
    managed-mldiagnostics-gke: "true"
spec:
  network:
    enableDNSHostnames: true
    subdomain: tpu-discovery-service
  replicatedJobs:
  - name: tpu-slice
    replicas: 1
    template:
      spec:
        parallelism: 1
        completions: 1
        completionMode: Indexed
        backoffLimit: 100
        template:
          metadata:
            labels:
              diagon-enabled: "true"
              managed-mldiagnostics-gke: "true"
          spec:
            serviceAccountName: workload-identity-k8s-sa ## KSA
            automountServiceAccountToken: true
            restartPolicy: Never
            nodeSelector:
              cloud.google.com/gke-tpu-accelerator: tpu-v6e-slice
              cloud.google.com/gke-tpu-topology: 2x2 ## topolgy
            containers:
            - name: jax-job
              image: us-central1-docker.pkg.dev/hpc-toolkit-demo/mld-test/mlloadtest:latest ## image
              ports:
              - containerPort: 8471 # Default port using which TPU VMs communicate
              - containerPort: 8431 # Port to export TPU runtime metrics, if supported.
              securityContext:
                privileged: true
              resources:
                requests:
                  google.com/tpu: 4
                limits:
                  google.com/tpu: 4
