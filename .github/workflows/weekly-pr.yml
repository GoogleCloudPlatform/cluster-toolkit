name: Test PR Summary

on:
  workflow_dispatch:

jobs:
  pr-summary:
    runs-on: ubuntu-latest
   
    steps:
      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Fetch PR count only (simple test)
        run: |
          REPO="GoogleCloudPlatform/cluster-toolkit"
          
          PRS=$(curl -s "https://api.github.com/repos/$REPO/pulls?state=closed&per_page=10")
 
          COUNT=$(echo "$PRS" | jq length)
          echo "Total PRs fetched: $COUNT" 
