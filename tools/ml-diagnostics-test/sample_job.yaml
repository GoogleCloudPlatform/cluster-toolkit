apiVersion: v1
kind: Service
metadata:
  name: tpu-discovery-service
  namespace: <user_namespace>
spec:
  clusterIP: None
  selector:
    jobset.sigs.k8s.io/jobset-name: sample-tpu-jobset
---
apiVersion: jobset.x-k8s.io/v1alpha2
kind: JobSet
metadata:
  name: sample-tpu-jobset
  namespace: <user_namespace>
  labels:
    diagon-enabled: "true"
    kueue.x-k8s.io/queue-name: user-queue
spec:
  network:
    enableDNSHostnames: true
    subdomain: tpu-discovery-service
  replicatedJobs:
  - name: tpu-slice
    replicas: 1
    template:
      spec:
        parallelism: 1
        completions: 1
        completionMode: Indexed
        backoffLimit: 100
        template:
          spec:
            serviceAccountName: <k8s-service-account-name> # default: workload-identity-k8s-sa
            automountServiceAccountToken: true
            restartPolicy: Never
            nodeSelector:
              cloud.google.com/gke-tpu-accelerator: <tpu_accelerator>
              cloud.google.com/gke-tpu-topology: <tpu_topology>
            containers:
            - name: jax-job
              # image: us-central1-docker.pkg.dev/<project_name>/mldiagnostics-test/<image-name>:latest
              image: #Add Image tag here
              env:
              - name: PROJECT_ID
                value: <project_id>
              - name: REGION
                value: <region>
              - name: GCS_PATH
                value: <gcs_bucket_path> #"gs://diagon-xprof-gcs/test"
              ports:
              - containerPort: 8471
              - containerPort: 8431
              securityContext:
                privileged: true
              resources:
                requests:
                  google.com/tpu: 4
                limits:
                  google.com/tpu: 4
