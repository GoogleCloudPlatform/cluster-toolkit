blueprint_name: slice_controller_test
ghpc_version: golden
validators:
  - validator: test_project_exists
    skip: true
  - validator: test_apis_enabled
    skip: true
  - validator: test_region_exists
    skip: true
  - validator: test_zone_exists
    skip: true
  - validator: test_zone_in_region
    skip: true
vars:
  deployment_name: golden_copy_deployment
  labels:
    ghpc_blueprint: slice_controller_test
    ghpc_deployment: ((var.deployment_name))
  project_id: invalid-project
  region: us-east4
deployment_groups:
  - group: one
    terraform_providers:
      google:
        source: hashicorp/google
        version: '>= 6.9.0, <= 7.21.0'
        configuration:
          project: ((var.project_id))
          region: ((var.region))
      google-beta:
        source: hashicorp/google-beta
        version: '>= 6.9.0, <= 7.21.0'
        configuration:
          project: ((var.project_id))
          region: ((var.region))
    modules:
      - source: modules/network/vpc
        kind: terraform
        id: network
        settings:
          deployment_name: ((var.deployment_name))
          labels: ((var.labels))
          project_id: ((var.project_id))
          region: ((var.region))
      - source: modules/scheduler/gke-cluster
        kind: terraform
        id: cluster
        use:
          - network
        settings:
          deployment_name: ((var.deployment_name))
          enable_slice_controller: true
          labels: ((var.labels))
          network_id: ((module.network.network_id))
          project_id: ((var.project_id))
          region: ((var.region))
          subnetwork_self_link: ((module.network.subnetwork_self_link))
