---

- name: Install Python and Git
  ansible.builtin.package:
    name:
      - python3
      - python3-pip
      - git
    state: present
  become: true

- name: Clone CHS develop branch
  ansible.builtin.git:
    repo: 'https://cluster-toolkit.googlesource.com/cluster-health-scanner'
    dest: /tmp/cluster-health-scanner
    version: develop

- name: Find CHS package directory
  ansible.builtin.find:
    paths: /tmp/cluster-health-scanner
    file_type: file
    patterns: 'pyproject.toml'
    recurse: yes
  register: chs_setup_file

- name: Print found setup file
  ansible.builtin.debug:
    msg: "Found setup file at: {{ chs_setup_file.files[0].path }}"

- name: Check if .netrc exists
  ansible.builtin.stat:
    path: ~/.netrc
  register: netrc_stat

- name: Fix .netrc permissions if it exists
  ansible.builtin.file:
    path: ~/.netrc
    mode: '0600'
  when: netrc_stat.stat.exists

- name: Download Miniconda
  ansible.builtin.get_url:
    url: https://repo.anaconda.com/miniconda/Miniconda3-latest-Linux-x86_64.sh
    dest: /tmp/miniconda.sh
    mode: '0755'

- name: Install Miniconda
  ansible.builtin.shell: /tmp/miniconda.sh -b -u -p $HOME/miniconda3
  args:
    creates: $HOME/miniconda3/bin/conda

- name: Create Conda environment for CHS
  ansible.builtin.shell: $HOME/miniconda3/bin/conda create -y -n chs python=3.10
  args:
    creates: $HOME/miniconda3/envs/chs/bin/python

- name: Install CHS (Conda Env)
  ansible.builtin.shell:
    cmd: $HOME/miniconda3/envs/chs/bin/pip install .
    chdir: "{{ chs_setup_file.files[0].path | dirname }}"

- name: "Run CHS NCCL and DCGM Tests"
  ansible.builtin.shell:
    cmd: PATH=$HOME/miniconda3/envs/chs/bin:$PATH chs run --scheduler {{ scheduler }} --machine-type {{ machine_type }} --tests nccl,dcgm
  register: chs_run
  changed_when: false
  ignore_errors: true

- name: "Print CHS run output"
  ansible.builtin.debug:
    msg: "{{ chs_run.stdout }}"

- name: "Handle CHS run failure"
  when: chs_run.failed
  block:
    - name: "Print CHS run stderr"
      ansible.builtin.debug:
        msg: "{{ chs_run.stderr }}"

    - name: "Find the newest CHS workspace directory"
      ansible.builtin.find:
        paths: "~/.local/share/cluster-health-scanner/workspaces/"
        file_type: directory
      register: failed_chs_workspaces

    - name: "Read internal.log from newest workspace"
      ansible.builtin.slurp:
        src: "{{ (failed_chs_workspaces.files | sort(attribute='ctime', reverse=True) | first).path }}/internal.log"
      register: internal_log_content
      when: failed_chs_workspaces.matched > 0
      ignore_errors: true

    - name: "Print internal.log"
      ansible.builtin.debug:
        msg: "internal.log contents:\n{{ internal_log_content['content'] | b64decode }}"
      when:
        - failed_chs_workspaces.matched > 0
        - internal_log_content is not failed
        - "'content' in internal_log_content"

    - name: "Fail the playbook as CHS run failed"
      ansible.builtin.fail:
        msg: "CHS run failed. See above logs for details."

- name: "Find the CHS workspace directory"
  ansible.builtin.find:
    paths: "~/.local/share/cluster-health-scanner/workspaces/"
    file_type: directory
  register: chs_workspaces

- name: "Set the Bill of Health path"
  ansible.builtin.set_fact:
    boh_path: "{{ chs_workspaces.files[0].path }}/chs-results/bill_of_health.json"

- name: "Read the Bill of Health"
  ansible.builtin.slurp:
    src: "{{ boh_path }}"
  register: boh_file

- name: "Print Bill of Health path"
  ansible.builtin.debug:
    msg: "Reading Bill of Health from: {{ boh_path }}"

- name: "Parse the Bill of Health"
  ansible.builtin.set_fact:
    boh: "{{ boh_file['content'] | b64decode | from_json }}"

- name: "Print Parsed Bill of Health"
  ansible.builtin.debug:
    var: boh

- name: "Print DCGM validation header"
  ansible.builtin.debug:
    msg: "--- Validating DCGM Metrics ---"

- name: "Print DCGM metric being validated"
  ansible.builtin.debug:
    msg: "Validating DCGM metric '{{ item.1.key }}' with value '{{ item.1.value }}' for resource '{{ item.0.target_resource_ids | first }}'."
  loop: "{{ boh.test_results | subelements('metrics', skip_missing=True) }}"
  when:
    - item.0.test_name == 'dcgm'

- name: "Validate DCGM diag metrics"
  ansible.builtin.assert:
    that:
      - item.1.value == 'Pass'
    fail_msg: "DCGM metric '{{ item.1.key }}' failed for resource '{{ item.0.target_resource_ids | first }}'."
    success_msg: "DCGM metric '{{ item.1.key }}' passed for resource '{{ item.0.target_resource_ids | first }}'."
  loop: "{{ boh.test_results | subelements('metrics', skip_missing=True) }}"
  when:
    - item.0.test_name == 'dcgm'

- name: "Print NCCL validation header"
  ansible.builtin.debug:
    msg: "--- Validating NCCL Metrics ---"

- name: "Print NCCL metric being validated"
  ansible.builtin.debug:
    msg: "Validating NCCL metric '{{ item.1.key }}' with value '{{ item.1.value }}'."
  loop: "{{ boh.test_results | subelements('metrics', skip_missing=True) }}"
  when:
    - item.0.test_name == 'nccl-cluster'
    - item.1.key == 'Avg. Bus Bandwidth'

- name: "Validate NCCL average bus bandwidth"
  ansible.builtin.assert:
    that:
      - item.1.value | float >= 25.0
    fail_msg: "NCCL 'Avg. Bus Bandwidth' is below threshold ({{ item.1.value }} GB/s)."
    success_msg: "NCCL 'Avg. Bus Bandwidth' is sufficient ({{ item.1.value }} GB/s)."
  loop: "{{ boh.test_results | subelements('metrics', skip_missing=True) }}"
  when:
    - item.0.test_name == 'nccl-cluster'
    - item.1.key == 'Avg. Bus Bandwidth'
