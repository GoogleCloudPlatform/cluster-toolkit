---

- name: Set local variables
  ansible.builtin.set_fact:
    source_job_file: "/workspace/modules/management/diagnostics/sample-workload-test/sample_job.yaml"
    modified_job_file: "/tmp/sample_job.yaml"
    target_namespace: "{{ custom_vars.user_namespace | default('default') }}"

- name: Assert variables are defined
  ansible.builtin.assert:
    that:
    - region is defined
    - custom_vars.project is defined

- name: Verify cert-manager charts are healthy in cert-manager namespace
  delegate_to: localhost
  ansible.builtin.command: kubectl get pods -n cert-manager -o json
  register: cert_manager_pods
  retries: 20
  delay: 15
  until:
  - cert_manager_pods.rc == 0
  - (cert_manager_pods.stdout | from_json)['items'] | length > 0
  - (cert_manager_pods.stdout | from_json)['items'] | map(attribute='status.phase') | select('equalto', 'Running') | list | length == (cert_manager_pods.stdout | from_json)['items'] | length

- name: Verify Diagon charts are healthy in gke-mldiagnostics
  delegate_to: localhost
  ansible.builtin.command: kubectl get pods -n gke-mldiagnostics -o json
  register: diagon_pods
  retries: 20
  delay: 15
  until:
  - diagon_pods.rc == 0
  - (diagon_pods.stdout | from_json)['items'] | length > 0
  - (diagon_pods.stdout | from_json)['items'] | map(attribute='status.phase') | select('equalto', 'Running') | list | length == (diagon_pods.stdout | from_json)['items'] | length

- name: Verify user namespace is labeled
  delegate_to: localhost
  ansible.builtin.command: kubectl get ns {{ target_namespace }} -o json
  register: ns_info
  failed_when:
  - ns_info.rc != 0
  - (ns_info.stdout | from_json).metadata.labels['managed-mldiagnostics-gke'] != 'true'

- name: Verify service account exists in user namespace
  delegate_to: localhost
  ansible.builtin.command: kubectl get sa workload-identity-k8s-sa -n {{ target_namespace }} -o json
  register: sa_info
  failed_when:
  - sa_info.rc != 0
  - (sa_info.stdout | from_json).metadata.annotations['iam.gke.io/gcp-service-account'] is not defined

- name: Verify LocalQueue exists in user namespace
  delegate_to: localhost
  ansible.builtin.command: kubectl get localqueue -n {{ target_namespace }} -o json
  register: lq_info
  failed_when:
  - lq_info.rc != 0
  - (lq_info.stdout | from_json)['items'] | length == 0

- name: Create modified sample workload job file
  delegate_to: localhost
  ansible.builtin.shell: |
    cp {{ source_job_file }} {{ modified_job_file }}
    sed -i 's/<user_namespace>/{{ target_namespace }}/g' {{ modified_job_file }}
    sed -i 's/<k8s-service-account-name>/{{ custom_vars.k8s_service_account }}/' {{ modified_job_file }}
    sed -i 's/<tpu_accelerator>/{{ custom_vars.tpu_accelerator }}/' {{ modified_job_file }}
    sed -i 's/<tpu_topology>/{{ custom_vars.tpu_topology }}/' {{ modified_job_file }}
    sed -i 's|<workload_image>|{{ custom_vars.image_tag }}|' {{ modified_job_file }}
    sed -i 's/<project_id>/{{ custom_vars.project }}/' {{ modified_job_file }}
    sed -i 's/<region>/{{ region }}/' {{ modified_job_file }}
    sed -i 's|<gcs_bucket_path>|gs://{{ custom_vars.gcs_bucket }}/{{ build }}|' {{ modified_job_file }}
  args:
    executable: /bin/bash

- name: Submit sample workload job
  delegate_to: localhost
  ansible.builtin.command: kubectl apply -f {{ modified_job_file }}
  register: job_submission

- name: Block to verify workload job and capture debug info on failure
  block:
  - name: Verify sample workload job pods are created
    delegate_to: localhost
    ansible.builtin.command: kubectl get pods -n {{ target_namespace }} -l jobset.sigs.k8s.io/jobset-name={{ custom_vars.jobset_name }} -o json
    register: job_pods
    until:
    - job_pods.rc == 0
    - (job_pods.stdout | from_json)['items'] | length > 0
    retries: 90
    delay: 10

  - name: Wait for jobset to complete
    delegate_to: localhost
    ansible.builtin.command: kubectl get jobset {{ custom_vars.jobset_name }} -n {{ target_namespace }} -o json
    register: jobset_info
    until:
    - jobset_info.rc == 0
    - (jobset_info.stdout | from_json).status.conditions | default([]) | selectattr('type', 'equalto', 'Completed') | selectattr('status', 'equalto', 'True') | list | length > 0
    retries: 30
    delay: 20

  - name: Verify logs contain ML Diagnostics URL
    delegate_to: localhost
    ansible.builtin.shell: |
      gcloud logging read "resource.type=\"k8s_container\" AND resource.labels.namespace_name=\"{{ target_namespace }}\" AND textPayload:\"ML Diagnostics URL\"" --project {{ custom_vars.project }} --limit 1 --format=json
    register: logs_output
    until:
    - logs_output.rc == 0
    - (logs_output.stdout | from_json) | length > 0
    retries: 10
    delay: 15

  - name: Verify profiling data in GCS
    delegate_to: localhost
    ansible.builtin.command: gcloud storage ls gs://{{ custom_vars.gcs_bucket }}/{{ build }}/**/*xplane.pb
    register: gcs_check
    until: gcs_check.rc == 0
    retries: 10
    delay: 15

  rescue:
  - name: "FAILURE: Capturing debug info"
    ansible.builtin.debug:
      msg: "ML Diagnostics test failed. Capturing logs and descriptions."

  - name: Get pods status on failure
    delegate_to: localhost
    ansible.builtin.command: kubectl get pods -n {{ target_namespace }} -o wide
    register: pods_on_failure
    changed_when: false

  - name: Print pods status on failure
    ansible.builtin.debug:
      var: pods_on_failure.stdout_lines

  - name: Describe jobset on failure
    delegate_to: localhost
    ansible.builtin.command: kubectl describe jobset {{ custom_vars.jobset_name }} -n {{ target_namespace }}
    register: jobset_describe
    changed_when: false

  - name: Print jobset description on failure
    ansible.builtin.debug:
      var: jobset_describe.stdout_lines

  - name: Get pod names on failure
    delegate_to: localhost
    ansible.builtin.command: kubectl get pods -n {{ target_namespace }} -l jobset.sigs.k8s.io/jobset-name={{ custom_vars.jobset_name }} --sort-by=.metadata.creationTimestamp -o jsonpath='{.items[*].metadata.name}'
    register: pod_names
    changed_when: false
    failed_when: false

  - name: Describe oldest pod on failure
    delegate_to: localhost
    ansible.builtin.command: kubectl describe pod {{ pod_names.stdout.split() | first }} -n {{ target_namespace }}
    register: pod_describe
    when: (pod_names.stdout.split() | length) > 0
    changed_when: false
    failed_when: false

  - name: Print oldest pod description on failure
    ansible.builtin.debug:
      var: pod_describe.stdout_lines
    when: (pod_names.stdout.split() | length) > 0

  - name: Get oldest pod logs on failure
    delegate_to: localhost
    ansible.builtin.command: kubectl logs {{ pod_names.stdout.split() | first }} -n {{ target_namespace }} --all-containers --tail=200
    register: pod_logs
    when: (pod_names.stdout.split() | length) > 0
    changed_when: false
    failed_when: false

  - name: Print oldest pod logs on failure
    ansible.builtin.debug:
      var: pod_logs.stdout_lines
    when: (pod_names.stdout.split() | length) > 0

  - name: Fail the playbook
    ansible.builtin.fail:
      msg: "ML Diagnostics test failed."

  always:
  - name: Cleanup sample job
    delegate_to: localhost
    ansible.builtin.command: kubectl delete -f {{ modified_job_file }}
    when: job_submission is defined and job_submission.changed
    failed_when: false

  - name: Cleanup GCS profiling data
    delegate_to: localhost
    ansible.builtin.command: gcloud storage rm -r gs://{{ custom_vars.gcs_bucket }}/{{ build }}
    when: job_submission is defined and job_submission.changed
    failed_when: false
