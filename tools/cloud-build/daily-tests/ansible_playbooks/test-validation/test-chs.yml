---

- name: CHS Test Suite
  delegate_to: "{{ 'localhost' if scheduler == 'gke' else inventory_hostname }}"
  vars:
    ansible_async_dir: "/tmp/.ansible_async"
    ansible_python_interpreter: /usr/bin/python3
  block:

  - name: Setup environment for CHS
    become: true
    block:
    - name: Ensure async directory exists
      ansible.builtin.file:
        path: "{{ ansible_async_dir }}"
        state: directory
        mode: '0777'
      become: true

    - name: Set variables for CHS setup
      ansible.builtin.set_fact:
        python_version: "3.10.13"
        pyenv_root: "/opt/pyenv"
        chs_venv_path: "/opt/chs_venv"

    - name: Install pyenv dependencies
      ansible.builtin.apt:
        name:
        - git
        - make
        - build-essential
        - libssl-dev
        - zlib1g-dev
        - libbz2-dev
        - libreadline-dev
        - libsqlite3-dev
        - wget
        - curl
        - llvm
        - libncurses5-dev
        - libncursesw5-dev
        - xz-utils
        - tk-dev
        - libffi-dev
        - liblzma-dev
        - python3-openssl
        state: present
        update_cache: true
      async: 120
      poll: 10

    - name: Clone pyenv
      ansible.builtin.git:
        repo: https://github.com/pyenv/pyenv.git
        dest: "{{ pyenv_root }}"
        version: v2.4.1
      async: 120
      poll: 10

    - name: Install Python using pyenv
      ansible.builtin.command:
        cmd: "{{ pyenv_root }}/bin/pyenv install -s {{ python_version }}"
      environment:
        PYENV_ROOT: "{{ pyenv_root }}"
      async: 120
      poll: 10
      changed_when: false

    - name: Create Virtual Environment with pyenv Python
      ansible.builtin.command:
        cmd: "{{ pyenv_root }}/versions/{{ python_version }}/bin/python3 -m venv {{ chs_venv_path }}"
        creates: "{{ chs_venv_path }}/bin/python"
      async: 120
      poll: 10

  - name: Install and Setup CHS
    block:
    - name: Create temporary directory for CHS clone
      ansible.builtin.tempfile:
        state: directory
        suffix: chs_clone
      register: chs_temp_dir

    - name: Clone CHS repository
      ansible.builtin.git:
        repo: "{{ chs_repo }}"
        dest: "{{ chs_temp_dir.path }}"
        refspec: 'refs/changes/00/2700/5'
        version: FETCH_HEAD
      async: 120
      poll: 10

    - name: Find CHS package directory
      ansible.builtin.find:
        paths: "{{ chs_temp_dir.path }}"
        file_type: file
        patterns: 'pyproject.toml'
        recurse: true
      register: chs_setup_file

    - name: Install CHS into venv
      ansible.builtin.pip:
        name: "{{ chs_setup_file.files[0].path | dirname }}"
        virtualenv: "{{ chs_venv_path }}"
      async: 300
      poll: 10
      become: true

  - name: Perform CHS Operations
    environment:
      PATH: "{{ chs_venv_path }}/bin:{{ lookup('env', 'PATH') }}"
      ENROOT_RUNTIME_PATH: "{{ ansible_user_dir }}/.enroot/run"
      ENROOT_CACHE_PATH: "{{ ansible_user_dir }}/.enroot/cache"
    block:

    - name: Configure bucket for CHS
      ansible.builtin.shell: |
        set -e -u
        chs configure bucket --name chs-results
      async: 120
      poll: 10
      changed_when: false

    - name: Ensure Enroot directories exist for slurm
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0700'
      loop:
        - "{{ ansible_user_dir }}/.enroot/run"
        - "{{ ansible_user_dir }}/.enroot/cache"
      when: scheduler == 'slurm'

    - name: "Run CHS lite suite"
      ansible.builtin.shell: |
        set -e -u
        chs run --scheduler {{ scheduler }} --machine-type {{ instance_type }} 
      register: chs_run
      async: 300
      poll: 10
      changed_when: false

  - name: CHS run output
    ansible.builtin.debug:
      var: chs_run.stdout_lines

  - name: Parse Bill of Health and Validate Metrics
    when: chs_run is success
    block:
    - name: "Find the CHS workspace directory"
      ansible.builtin.find:
        paths: "~/.local/share/chs/workspaces/"
        file_type: directory
      register: chs_workspaces

    - name: Assert CHS workspace directory found
      ansible.builtin.assert:
        that:
        - chs_workspaces.files | default([]) | length > 0
        fail_msg: "Could not find CHS workspace directory"

    - name: "Set the Bill of Health path"
      ansible.builtin.set_fact:
        boh_path: "{{ chs_workspaces.files[0].path }}/bill_of_health.json"

    - name: "Read the Bill of Health"
      ansible.builtin.slurp:
        src: "{{ boh_path }}"
      register: boh_file

    - name: "Parse the Bill of Health"
      ansible.builtin.set_fact:
        boh: "{{ boh_file['content'] | b64decode | from_json }}"

    - name: "Validate DCGM diag metrics"
      ansible.builtin.assert:
        that:
        - item.1.value == 'Pass'
        fail_msg: "DCGM metric '{{ item.1.key }}' failed for resource '{{ item.0.target_resource_ids | first }}'."
        success_msg: "DCGM metric '{{ item.1.key }}' passed for resource '{{ item.0.target_resource_ids | first }}'."
      loop: "{{ boh.test_results | default([]) | subelements('metrics', skip_missing=True) }}"
      when:
      - item.0.test_name == 'dcgm'

    - name: "Validate NCCL average bus bandwidth"
      ansible.builtin.assert:
        that:
        - (item.1.value | float) >= 150.0
        fail_msg: "NCCL 'Avg. Bus Bandwidth' is below threshold ({{ item.1.value }} GB/s)."
        success_msg: "NCCL 'Avg. Bus Bandwidth' is sufficient ({{ item.1.value }} GB/s)."
      loop: "{{ boh.test_results | default([]) | subelements('metrics', skip_missing=True) }}"
      when:
      - item.0.test_name == 'nccl-cluster'
      - item.1.key == 'Avg. Bus Bandwidth'

  rescue:
  - name: Find the internal.log for this specific failed run
    ansible.builtin.shell: |
      ls -td ~/.local/share/chs/workspaces/*/ | head -n 1
    register: latest_workspace

  - name: Print the internal.log content
    ansible.builtin.command: "cat {{ latest_workspace.stdout }}internal.log"
    register: internal_log_content
    when: latest_workspace.stdout | length > 0

  - name: Display internal.log
    ansible.builtin.debug:
      var: internal_log_content.stdout_lines
    when: internal_log_content is not skipped

  - name: CHS Test Failure
    ansible.builtin.debug:
      msg: "CHS tests failed or timed out. Continuing playbook execution."

  always:
  - name: Cleanup Kubernetes resources
    delegate_to: localhost
    ansible.builtin.shell: |
      kubectl delete jobset --all --ignore-not-found
      kubectl delete job --all --ignore-not-found
      kubectl delete pod --all --ignore-not-found
    async: 600
    poll: 10
    ignore_errors: true
    when: scheduler == 'gke'

  - name: Cleanup Slurm resources
    ansible.builtin.shell: |
      scancel -u $(whoami)
    async: 600
    poll: 10
    when: scheduler == 'slurm'
    ignore_errors: true

  - name: Cleanup temporary directory
    ansible.builtin.file:
      path: "{{ chs_temp_dir.path }}"
      state: absent
    ignore_errors: true
    when: chs_temp_dir.path is defined
