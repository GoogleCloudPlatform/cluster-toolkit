---
- name: Get outputs from primary group
  delegate_to: localhost
  ansible.builtin.command:
    cmd: terraform output -json
    chdir: "{{ workspace }}/{{ deployment_name }}/primary"
  register: outputs
  changed_when: false

- name: Set necessary facts
  delegate_to: localhost
  ansible.builtin.set_fact:
    bucket_name: "{{ (outputs.stdout | from_json)['gcs_bucket_name_zonal-gcs-bucket']['value'] }}"
    cache_zone: "{{ (lookup('file', blueprint_yaml) | from_yaml)['vars']['zone'] }}"
    gcs_bucket_local_mount: "{{ (lookup('file', blueprint_yaml) | from_yaml)['vars']['gcs_bucket_local_mount'] }}"

- name: Get bucket metadata
  delegate_to: localhost
  ansible.builtin.command: gcloud storage buckets describe gs://{{ bucket_name }} --format=json
  register: bucket_metadata
  changed_when: false

- name: Assert storage class
  delegate_to: localhost
  ansible.builtin.assert:
    that:
    - (bucket_metadata.stdout | from_json)['default_storage_class'] == 'RAPID'

- name: Assert placement zone
  delegate_to: localhost
  ansible.builtin.assert:
    that:
    - ((bucket_metadata.stdout | from_json)['data_locations'][0] | lower) == (cache_zone | lower)

- name: Wait for Anywhere Cache creation
  delegate_to: localhost
  ansible.builtin.shell: |
    gcloud alpha storage operations list gs://{{ bucket_name }} --format=json | jq -e '.[] | select(.metadata.commonMetadata.type == "create-anywhere-cache" and .done == true and (has("error") | not))'
  register: cache_operation
  until: cache_operation.rc == 0
  retries: 6
  delay: 10
  changed_when: false

- name: Ensure fio is installed (safe for all OS)
  ansible.builtin.raw: |
    if ! command -v fio >/dev/null 2>&1; then
      if command -v apt-get >/dev/null 2>&1; then
        apt-get update -y && apt-get install -y fio
      elif command -v yum >/dev/null 2>&1; then
        yum install -y fio
      elif command -v dnf >/dev/null 2>&1; then
        dnf install -y fio
      fi
    fi
  become: true

- name: Run FIO test
  ansible.builtin.shell: |
    fio --name=randread_latency_test --filename="{{ gcs_bucket_local_mount }}/fio" --filesize=1G --time_based=1 --ramp_time=10s --runtime=1m --ioengine=libaio --direct=1 --verify=0 --randrepeat=0 --bs=4K --iodepth=1 --rw=randread --disable_slat=1 --disable_clat=1 --lat_percentiles=1 --numjobs=1 --group_reporting --output-format=json > fio_output.json
  args:
    chdir: "{{ gcs_bucket_local_mount }}"
  become: true

- name: Fetch FIO output
  ansible.builtin.fetch:
    src: "{{ gcs_bucket_local_mount }}/fio_output.json"
    dest: "{{ workspace }}/fio_output.json"
    flat: yes
  become: true

- name: Read FIO results from fetched file
  delegate_to: localhost
  ansible.builtin.set_fact:
    fio_results: "{{ lookup('file', workspace + '/fio_output.json') | from_json }}"

- name: Print FIO results
  delegate_to: localhost
  ansible.builtin.debug:
    var: fio_results

- name: Assert FIO read performance thresholds
  delegate_to: localhost
  ansible.builtin.assert:
    that:
    - fio_results.jobs[0].read.bw_mean >= 1000
    - fio_results.jobs[0].read.iops_mean >= 300
    fail_msg: "FIO read performance thresholds not met. Bandwidth: {{ fio_results.jobs[0].read.bw_mean }} KB/s (expected >= 1000 KB/s), IOPS: {{ fio_results.jobs[0].read.iops_mean }} (expected >= 300)."
    success_msg: "FIO read performance thresholds met. Bandwidth: {{ fio_results.jobs[0].read.bw_mean }} KB/s, IOPS: {{ fio_results.jobs[0].read.iops_mean }}."
