- name: Assert variables are defined
  ansible.builtin.assert:
    that:
    - region is defined
    - custom_vars.project is defined

- name: Get cluster credentials for kubectl
  delegate_to: localhost
  ansible.builtin.command: gcloud container clusters get-credentials {{ deployment_name }} --region {{ region }} --project {{ custom_vars.project }} --verbosity=debug
  changed_when: false

- name: Wait for Kueue controller manager to be ready
  delegate_to: localhost
  ansible.builtin.shell: |
    kubectl wait --for=condition=available deployment/kueue-controller-manager -n kueue-system --timeout=5m
  args:
    executable: /bin/bash
  changed_when: false

- name: Create the topology kueue config
  delegate_to: localhost
  ansible.builtin.shell: |
    kubectl apply -f {{ workspace }}/tools/cloud-build/daily-tests/blueprints/kueue-config-files/tas-queues.yaml -v=9
  changed_when: true

- name: Create a unique host topology job and capture its name
  delegate_to: localhost
  ansible.builtin.shell: |
    # Use kubectl create -o name and awk to reliably get the generated job name
    JOB_FULL_NAME=$(kubectl create -f {{ workspace }}/tools/cloud-build/daily-tests/blueprints/kueue-config-files/host-topology-tas-small-job.yaml -o name)
    JOB_NAME=$(echo $JOB_FULL_NAME | awk -F'/' '{print $2}')
    echo "Job name created: $JOB_NAME"
    echo $JOB_NAME
  register: host_job_name_output
  changed_when: true

- name: Wait for Workload to be created for the host topology job
  delegate_to: localhost
  ansible.builtin.shell: >
    kubectl get workload -l kueue.x-k8s.io/job-name={{ host_job_name_output.stdout_lines[-1] }} -o jsonpath='{.items[0].metadata.name}'
  register: workload_name
  until: workload_name.stdout | length > 0
  retries: 20
  delay: 10
  changed_when: false

- name: PROXY CHECK - Ensure TopologyAssignment exists for the host topology job
  delegate_to: localhost
  ansible.builtin.shell: >
    kubectl get workload {{ workload_name.stdout }} -n default -o jsonpath='{.status.admission.podSetAssignments[0].topologyAssignment}'
  register: topology_assignment
  until: topology_assignment.stdout | length > 0 and topology_assignment.stdout != "<none>"
  retries: 12
  delay: 10
  changed_when: false

- name: Wait until pods for the host topology job are running
  delegate_to: localhost
  ansible.builtin.shell: |
    kubectl get pods -l job-name={{ host_job_name_output.stdout_lines[-1] }} -o jsonpath='{.items[?(@.status.phase=="Running")].metadata.name}' | wc -w
  register: running_pod_count
  until: running_pod_count.stdout | int == 2
  retries: 20
  delay: 10
  changed_when: false

- name: Assert all pods are on the same host
  delegate_to: localhost
  ansible.builtin.shell: |
    kubectl get pods -l job-name={{ host_job_name_output.stdout_lines[-1] }} \
    -o custom-columns="Host:.spec.nodeName" | tail -n +2 | sort | uniq | wc -l
  register: unique_host_count
  until: unique_host_count.stdout | int == 1 # Corrected assertion to 1
  retries: 10
  delay: 10
  changed_when: false

- name: Delete the host topology kueue job
  delegate_to: localhost
  ansible.builtin.command: kubectl delete job {{ host_job_name_output.stdout_lines[-1] }}
  changed_when: true

- name: Create the rack topology kueue job
  delegate_to: localhost
  ansible.builtin.shell: |
    array=({{ workspace }}/tools/cloud-build/daily-tests/blueprints/kueue-config-files/rack-topology-tas-small-job.yaml)
    kubectl create -f ${array[0]} -v=9
    echo ${array[0]}
  args:
    executable: /bin/bash
  changed_when: False

- name: Ensure all pods are on the same rack
  delegate_to: localhost
  ansible.builtin.shell: |
    kubectl get pods -v=9 \
    -o custom-columns="Name:.metadata.name,Host:.spec.nodeSelector.cloud\.google\.com/gce-topology-subblock" | \
    sort -k2 | uniq -f 1 | wc -l
  register: unique_host_count
  until: unique_host_count.stdout | int == 2
  retries: 10
  delay: 10

- name: Delete the rack topology kueue job
  delegate_to: localhost
  ansible.builtin.shell: |
    kubectl delete --all jobs -v=9
  args:
    executable: /bin/bash
  changed_when: False

- name: Create the block topology kueue job
  delegate_to: localhost
  ansible.builtin.shell: |
    array=({{ workspace }}/tools/cloud-build/daily-tests/blueprints/kueue-config-files/block-topology-tas-small-job.yaml)
    kubectl create -f ${array[0]} -v=9
    echo ${array[0]}
  args:
    executable: /bin/bash
  changed_when: False

- name: Ensure all pods are on the same block
  delegate_to: localhost
  ansible.builtin.shell: |
    kubectl get pods -v=9 \
    -o custom-columns="Name:.metadata.name,Host:.spec.nodeSelector.cloud\.google\.com/gce-topology-block" | \
    sort -k2 | uniq -f 1 | wc -l
  register: unique_host_count
  until: unique_host_count.stdout | int == 2
  retries: 10
  delay: 10

- name: Wait for job to complete
  delegate_to: localhost
  ansible.builtin.command: |
    kubectl get job --field-selector  status.successful=2
  register: job_completion
  until: job_completion.stdout_lines | length > 1
  retries: 10
  delay: 5

- name: Print job_completion debug output
  ansible.builtin.debug:
    var: job_completion.stdout_lines
