- name: Assert variables are defined
  ansible.builtin.assert:
    that:
    - region is defined
    - custom_vars.project is defined

- name: Get cluster credentials for kubectl
  delegate_to: localhost
  ansible.builtin.command: gcloud container clusters get-credentials {{ deployment_name }} --region {{ region }} --project {{ custom_vars.project }} --verbosity=debug

- name: Create the topology kueue
  delegate_to: localhost
  ansible.builtin.shell: |
    array=({{ workspace }}/tools/cloud-build/daily-tests/blueprints/kueue-config-files/tas-queues.yaml)
    kubectl create -f ${array[0]} -v=9
    echo ${array[0]}
  args:
    executable: /bin/bash
  changed_when: False

- name: Create the host topology kueue job
  delegate_to: localhost
  ansible.builtin.shell: |
    array=({{ workspace }}/tools/cloud-build/daily-tests/blueprints/kueue-config-files/host-topology-tas-small-job.yaml)
    kubectl create -f ${array[0]} -v=9
    echo ${array[0]}
  args:
    executable: /bin/bash
  register: host_job_creation # <-- Added register to capture output
  changed_when: true

- name: Wait for and get the workload name for the host topology job
  delegate_to: localhost
  ansible.builtin.shell: >
    # This task remains, but it needs to search for the workload correctly.
    # The previous command was a shell one-liner, but it didn't capture the job name.
    # We'll use a more robust search pattern here.
    kubectl get workload -l kueue.x-k8s.io/queue-name=tas-user-queue \
    -o jsonpath='{.items[0].metadata.name}'
  register: workload_name
  until: workload_name.stdout | length > 0
  retries: 20
  delay: 10
  changed_when: false

- name: Debug - Get and print the full Workload status
  delegate_to: localhost
  ansible.builtin.command: kubectl get workload {{ workload_name.stdout }} -n default -o yaml
  register: debug_workload_status
  until: debug_workload_status.rc == 0
  retries: 5
  delay: 2
  failed_when: false
  changed_when: false

- name: Print the full workload status
  ansible.builtin.debug:
    var: debug_workload_status.stdout

- name: Check TopologyAssignment for Host Topology
  delegate_to: localhost
  ansible.builtin.shell: >
    kubectl get workload {{ workload_name.stdout }} -n default -o jsonpath='{.status.admission.podSetAssignments[0].topologyAssignment}'
  register: topology_assignment_host
  until: topology_assignment_host.stdout | length > 0 and topology_assignment_host.stdout != "<none>"
  retries: 10
  delay: 10
  changed_when: false

- name: Assert TopologyAssignment exists for Host Topology
  ansible.builtin.assert:
    that:
    - topology_assignment_host.stdout is defined
    - topology_assignment_host.stdout | length > 0
    msg: "TopologyAssignment not found for Host Topology. TAS might not be working."

- name: Delete the host topology kueue job
  delegate_to: localhost
  ansible.builtin.shell: |
    kubectl delete --all jobs -v=9
  args:
    executable: /bin/bash
  changed_when: true

- name: Create the rack topology kueue job
  delegate_to: localhost
  ansible.builtin.shell: |
    array=({{ workspace }}/tools/cloud-build/daily-tests/blueprints/kueue-config-files/rack-topology-tas-small-job.yaml)
    kubectl create -f ${array[0]} -v=9
    echo ${array[0]}
  args:
    executable: /bin/bash
  changed_when: False

- name: Ensure all pods are on the same rack
  delegate_to: localhost
  ansible.builtin.shell: |
    kubectl get pods -v=9 \
    -o custom-columns="Name:.metadata.name,Host:.spec.nodeSelector.cloud\.google\.com/gce-topology-subblock" | \
    sort -k2 | uniq -f 1 | wc -l
  register: unique_host_count
  until: unique_host_count.stdout | int == 2
  retries: 10
  delay: 10

- name: Delete the rack topology kueue job
  delegate_to: localhost
  ansible.builtin.shell: |
    kubectl delete --all jobs -v=9
  args:
    executable: /bin/bash
  changed_when: False

- name: Create the block topology kueue job
  delegate_to: localhost
  ansible.builtin.shell: |
    array=({{ workspace }}/tools/cloud-build/daily-tests/blueprints/kueue-config-files/block-topology-tas-small-job.yaml)
    kubectl create -f ${array[0]} -v=9
    echo ${array[0]}
  args:
    executable: /bin/bash
  changed_when: False

- name: Ensure all pods are on the same block
  delegate_to: localhost
  ansible.builtin.shell: |
    kubectl get pods -v=9 \
    -o custom-columns="Name:.metadata.name,Host:.spec.nodeSelector.cloud\.google\.com/gce-topology-block" | \
    sort -k2 | uniq -f 1 | wc -l
  register: unique_host_count
  until: unique_host_count.stdout | int == 2
  retries: 10
  delay: 10

- name: Wait for job to complete
  delegate_to: localhost
  ansible.builtin.command: |
    kubectl get job --field-selector  status.successful=2
  register: job_completion
  until: job_completion.stdout_lines | length > 1
  retries: 10
  delay: 5

- name: Print job_completion debug output
  ansible.builtin.debug:
    var: job_completion.stdout_lines
