- +
- name: Get cluster credentials for kubectl
  delegate_to: localhost
  ansible.builtin.command: gcloud container clusters get-credentials {{ deployment_name }} --region {{ region }} --project {{ custom_vars.project }} --verbosity=debug

- name: Wait for Kueue controller manager to be ready
  delegate_to: localhost
  ansible.builtin.shell: |
    kubectl wait --for=condition=available deployment/kueue-controller-manager -n kueue-system --timeout=5m
  args:
    executable: /bin/bash
  changed_when: False

- name: Create the topology kueue
  delegate_to: localhost
  ansible.builtin.shell: |
    array=({{ workspace }}/tools/cloud-build/daily-tests/blueprints/kueue-config-files/tas-queues.yaml)
    kubectl create -f ${array[0]} -v=9
    echo ${array[0]}
  args:
    executable: /bin/bash
  changed_when: False

- name: Create the host topology kueue job and capture its name
  delegate_to: localhost
  ansible.builtin.shell: |
    kubectl create -f {{ workspace }}/tools/cloud-build/daily-tests/blueprints/kueue-config-files/host-topology-tas-small-job.yaml -o=jsonpath='{.metadata.name}' > /tmp/host_job_name.txt
    cat /tmp/host_job_name.txt
  register: host_job_creation
  changed_when: False

- name: Get host topology job name from file
  delegate_to: localhost
  ansible.builtin.command: cat /tmp/host_job_name.txt
  register: host_job_name
  changed_when: False

- name: Wait for and get the workload name for the host topology job
  delegate_to: localhost
  ansible.builtin.shell: >
    kubectl get workload -l kueue.x-k8s.io/job-name={{ host_job_name.stdout }} -o jsonpath='{.items[0].metadata.name}'
  register: workload_name
  until: workload_name.stdout != ""
  retries: 10
  delay: 15

- name: PROXY CHECK - Ensure TopologyAssignment exists in Workload status
  delegate_to: localhost
  ansible.builtin.shell: >
    kubectl get workload {{ workload_name.stdout }} -n default -o jsonpath='{.status.admission.podSetAssignments[0].topologyAssignment}'
  register: topology_assignment
  until: topology_assignment.stdout != "" and topology_assignment.stdout != "<none>"
  retries: 12
  delay: 10

- name: Ensure all pods are on the same host
  delegate_to: localhost
  ansible.builtin.shell: |
    kubectl get pods -v=9 \
    -o custom-columns="Name:.metadata.name,Host:.spec.nodeSelector.cloud\.google\.com/gce-topology-host" | \
    sort -k2 | uniq -f 1 | wc -l
  register: unique_host_count
  until: unique_host_count.stdout | int == 2
  retries: 10
  delay: 10

- name: Delete the host topology kueue job
  delegate_to: localhost
  ansible.builtin.shell: |
    kubectl delete --all jobs -v=9
  args:
    executable: /bin/bash
  changed_when: False

- name: Create the rack topology kueue job
  delegate_to: localhost
  ansible.builtin.shell: |
    array=({{ workspace }}/tools/cloud-build/daily-tests/blueprints/kueue-config-files/rack-topology-tas-small-job.yaml)
    kubectl create -f ${array[0]} -v=9
    echo ${array[0]}
  args:
    executable: /bin/bash
  changed_when: False

- name: Ensure all pods are on the same rack
  delegate_to: localhost
  ansible.builtin.shell: |
    kubectl get pods -v=9 \
    -o custom-columns="Name:.metadata.name,Host:.spec.nodeSelector.cloud\.google\.com/gce-topology-subblock" | \
    sort -k2 | uniq -f 1 | wc -l
  register: unique_host_count
  until: unique_host_count.stdout | int == 2
  retries: 10
  delay: 10

- name: Delete the rack topology kueue job
  delegate_to: localhost
  ansible.builtin.shell: |
    kubectl delete --all jobs -v=9
  args:
    executable: /bin/bash
  changed_when: False

- name: Create the block topology kueue job
  delegate_to: localhost
  ansible.builtin.shell: |
    array=({{ workspace }}/tools/cloud-build/daily-tests/blueprints/kueue-config-files/block-topology-tas-small-job.yaml)
    kubectl create -f ${array[0]} -v=9
    echo ${array[0]}
  args:
    executable: /bin/bash
  changed_when: False

- name: Ensure all pods are on the same block
  delegate_to: localhost
  ansible.builtin.shell: |
    kubectl get pods -v=9 \
    -o custom-columns="Name:.metadata.name,Host:.spec.nodeSelector.cloud\.google\.com/gce-topology-block" | \
    sort -k2 | uniq -f 1 | wc -l
  register: unique_host_count
  until: unique_host_count.stdout | int == 2
  retries: 10
  delay: 10

- name: Wait for job to complete
  delegate_to: localhost
  ansible.builtin.command: |
    kubectl get job --field-selector  status.successful=2
  register: job_completion
  until: job_completion.stdout_lines | length > 1
  retries: 10
  delay: 5

- name: Print job_completion debug output
  ansible.builtin.debug:
    var: job_completion.stdout_lines
