---

- name: Install pyenv dependencies
  ansible.builtin.shell: |
    export DEBIAN_FRONTEND=noninteractive
    apt-get update
    apt-get install -y git make build-essential libssl-dev zlib1g-dev libbz2-dev \
      libreadline-dev libsqlite3-dev wget curl llvm libncurses5-dev libncursesw5-dev \
      xz-utils tk-dev libffi-dev liblzma-dev python3-openssl
  become: true

- name: Clone pyenv
  ansible.builtin.git:
    repo: https://github.com/pyenv/pyenv.git
    dest: /opt/pyenv
    version: master
  become: true

- name: Install Python 3.10.13 using pyenv
  ansible.builtin.command:
    cmd: /opt/pyenv/bin/pyenv install -s 3.10.13
  environment:
    PYENV_ROOT: /opt/pyenv
  become: true
  
- name: Create Virtual Environment with pyenv Python
  ansible.builtin.command:
    cmd: /opt/pyenv/versions/3.10.13/bin/python3 -m venv /opt/chs_venv
    creates: /opt/chs_venv/bin/python
  become: true

- name: Clone CHS repository
  ansible.builtin.git:
    repo: "{{ chs_repo }}"
    dest: /tmp/cluster-health-scanner

- name: Find CHS package directory
  ansible.builtin.find:
    paths: /tmp/cluster-health-scanner
    file_type: file
    patterns: 'pyproject.toml'
    recurse: yes
  register: chs_setup_file

- name: Install CHS into venv
  ansible.builtin.pip:
    name: "{{ chs_setup_file.files[0].path | dirname }}"
    virtualenv: /opt/chs_venv
  become: true

- name: Configure and Run CHS
  ansible.builtin.shell: |
    export PATH="/opt/chs_venv/bin:$PATH"
    echo "PATH inside task: $PATH"
    chs configure bucket
    chs run --scheduler {{ scheduler }} --machine-type {{ machine_type }}
  register: chs_run
  changed_when: false

- name: Debug PATH after task
  ansible.builtin.shell: |
    echo "PATH after task: $PATH"
  register: path_after
  changed_when: false

- name: Show PATH debugging
  ansible.builtin.debug:
    msg:
      - "{{ chs_run.stdout_lines | select('match', '^PATH inside task:.*') | list }}"
      - "{{ path_after.stdout_lines | select('match', '^PATH after task:.*') | list }}"

- name: CHS run output
  ansible.builtin.debug:
    var: chs_run.stdout_lines

- name: "Find the CHS workspace directory"
  ansible.builtin.find:
    paths: "~/.local/share/chs/workspaces/"
    file_type: directory
  register: chs_workspaces

- name: "Set the Bill of Health path"
  ansible.builtin.set_fact:
    boh_path: "{{ chs_workspaces.files[0].path }}/bill_of_health.json"

- name: "Read the Bill of Health"
  ansible.builtin.slurp:
    src: "{{ boh_path }}"
  register: boh_file

- name: "Parse the Bill of Health"
  ansible.builtin.set_fact:
    boh: "{{ boh_file['content'] | b64decode | from_json }}"

- name: "Validate DCGM diag metrics"
  ansible.builtin.assert:
    that:
      - item.1.value == 'Pass'
    fail_msg: "DCGM metric '{{ item.1.key }}' failed for resource '{{ item.0.target_resource_ids | first }}'."
    success_msg: "DCGM metric '{{ item.1.key }}' passed for resource '{{ item.0.target_resource_ids | first }}'."
  loop: "{{ boh.test_results | subelements('metrics', skip_missing=True) }}"
  when:
    - item.0.test_name == 'dcgm'

- name: "Validate NCCL average bus bandwidth"
  ansible.builtin.assert:
    that:
      - item.1.value | float >= 25.0
    fail_msg: "NCCL 'Avg. Bus Bandwidth' is below threshold ({{ item.1.value }} GB/s)."
    success_msg: "NCCL 'Avg. Bus Bandwidth' is sufficient ({{ item.1.value }} GB/s)."
  loop: "{{ boh.test_results | subelements('metrics', skip_missing=True) }}"
  when:
    - item.0.test_name == 'nccl-cluster'
    - item.1.key == 'Avg. Bus Bandwidth'
