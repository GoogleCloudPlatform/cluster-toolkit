---

- name: Install Python, Git, and Pip
  ansible.builtin.package:
    name:
      - python3
      - python3-pip
      - git
    state: present
  become: true

- name: Create Virtual Environment (without pip to avoid ensurepip error)
  ansible.builtin.command:
    cmd: python3 -m venv --without-pip /opt/chs_venv
    creates: /opt/chs_venv/bin/python
  become: true

- name: Manually install pip into the venv
  ansible.builtin.shell:
    cmd: curl https://bootstrap.pypa.io/get-pip.py | /opt/chs_venv/bin/python3
    creates: /opt/chs_venv/bin/pip
  become: true

- name: Install CHS into venv
  ansible.builtin.pip:
    name: "/tmp/cluster-health-scanner"
    virtualenv: /opt/chs_venv
  become: true

- name: Configure bucket for CHS
  ansible.builtin.shell:
    cmd: chs configure bucket
  environment:
    PATH: "/opt/chs_venv/bin:{{ ansible_env.PATH }}"

- name: "Run CHS lite suite"
  ansible.builtin.shell:
    cmd: chs run --scheduler {{ scheduler }} --machine-type {{ machine_type }}
  environment:
    PATH: "/opt/chs_venv/bin:{{ ansible_env.PATH }}"
  register: chs_run
  changed_when: false

- name: CHS run output
  ansible.builtin.debug:
    var: chs_run.stdout_lines

- name: "Find the CHS workspace directory"
  ansible.builtin.find:
    paths: "~/.local/share/chs/workspaces/"
    file_type: directory
  register: chs_workspaces

- name: "Set the Bill of Health path"
  ansible.builtin.set_fact:
    boh_path: "{{ chs_workspaces.files[0].path }}/bill_of_health.json"

- name: "Read the Bill of Health"
  ansible.builtin.slurp:
    src: "{{ boh_path }}"
  register: boh_file

- name: "Parse the Bill of Health"
  ansible.builtin.set_fact:
    boh: "{{ boh_file['content'] | b64decode | from_json }}"

- name: "Validate DCGM diag metrics"
  ansible.builtin.assert:
    that:
      - item.1.value == 'Pass'
    fail_msg: "DCGM metric '{{ item.1.key }}' failed for resource '{{ item.0.target_resource_ids | first }}'."
    success_msg: "DCGM metric '{{ item.1.key }}' passed for resource '{{ item.0.target_resource_ids | first }}'."
  loop: "{{ boh.test_results | subelements('metrics', skip_missing=True) }}"
  when:
    - item.0.test_name == 'dcgm'

- name: "Validate NCCL average bus bandwidth"
  ansible.builtin.assert:
    that:
      - item.1.value | float >= 25.0
    fail_msg: "NCCL 'Avg. Bus Bandwidth' is below threshold ({{ item.1.value }} GB/s)."
    success_msg: "NCCL 'Avg. Bus Bandwidth' is sufficient ({{ item.1.value }} GB/s)."
  loop: "{{ boh.test_results | subelements('metrics', skip_missing=True) }}"
  when:
    - item.0.test_name == 'nccl-cluster'
    - item.1.key == 'Avg. Bus Bandwidth'
