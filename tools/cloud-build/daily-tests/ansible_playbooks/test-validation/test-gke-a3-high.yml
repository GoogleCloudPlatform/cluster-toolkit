- name: Assert variables are defined
  ansible.builtin.assert:
    that:
    - region is defined
    - custom_vars.project is defined

- name: Get cluster credentials for kubectl
  delegate_to: localhost
  ansible.builtin.shell: |
    gcloud container clusters get-credentials {{ deployment_name }} --region {{ region }} --project {{ custom_vars.project }} --verbosity=debug

- name: Get GKE cluster version
  delegate_to: localhost
  ansible.builtin.shell: |
    gcloud container clusters describe {{ deployment_name }} --region {{ region }} --project {{ custom_vars.project }} --format="value(currentMasterVersion)"
  register: gke_version_info

- name: Print GKE cluster version
  ansible.builtin.debug:
    msg: "GKE Cluster Version: {{ gke_version_info.stdout }}"

- name: Prepare NCCL test manifest
  delegate_to: localhost
  ansible.builtin.shell: |
    cp {{ workspace }}/examples/gke-a3-highgpu/nccl-test.yaml {{ workspace }}/examples/nccl-test.yaml
    sed -i 's/gke-a3-high/{{ deployment_name }}/g' {{ workspace }}/examples/nccl-test.yaml
    cat {{ workspace }}/examples/nccl-test.yaml
  register: nccl_test_file_contents

- name: Display NCCL test file
  debug:
    msg: "{{ nccl_test_file_contents.stdout }}"

- name: Create NCCL test JobSet
  delegate_to: localhost
  ansible.builtin.shell: |
    kubectl apply -f {{ workspace }}/examples/nccl-test.yaml -v=9

- name: Wait for JobSet to hit 2/2 completions
  delegate_to: localhost
  ansible.builtin.shell: |
    kubectl get jobset nccl-test -o jsonpath='{.status.replicatedJobsStatus[0].succeeded}'
  register: jobset_status
  until: jobset_status.stdout == "2"
  retries: 30
  delay: 10

- name: Fetch logs from the master worker pod
  delegate_to: localhost
  ansible.builtin.shell: |
    pod_name="$(kubectl get pods --no-headers -o custom-columns="Name:.metadata.name" | awk '{if ($1 ~ "worker-0-0") print $0}')"
    kubectl logs ${pod_name} -c nccl-test > pod_logs.txt
    cat pod_logs.txt
  register: nccl_test_logs

- name: Print the NCCL test logs
  debug:
    msg: "{{ nccl_test_logs.stdout }}"

- name: Ensure average bus bandwidth is >= 25 GB/s
  delegate_to: localhost
  ansible.builtin.shell: |
    grep -o '# Avg bus bandwidth    : [0-9\.]*' pod_logs.txt | cut -d ':' -f 2 | awk '{$1=$1;print}'
  register: avg_bus_bandwidth
  failed_when: avg_bus_bandwidth.stdout | float < 25

- name: Clean up
  delegate_to: localhost
  ansible.builtin.shell: |
    kubectl delete -f {{ workspace }}/examples/nccl-test.yaml
