---
test_name: slurm-rapid-storage
deployment_name: rapid-{{ build }}
slurm_cluster_name: "rapid{{ build[0:4] }}"
region: us-central1
zone: us-central1-b
workspace: /workspace
blueprint_yaml: "{{ workspace }}/examples/rapid-storage-slurm.yaml"
network: "{{ test_name }}-net"
login_node: "{{ slurm_cluster_name }}-slurm-login-*"
controller_node: "{{ slurm_cluster_name }}-controller"
post_deploy_tests:
- test-validation/test-slurm-rapid-storage.yml
cli_deployment_vars:
  region: "{{ region }}"
  network_name: "{{ network }}"
  slurm_cluster_name: "{{ slurm_cluster_name }}"
custom_vars:
  project_id: "{{ project }}"
  zone: "{{ zone }}"
  output_dir: "{{ (lookup('file', blueprint_yaml) | from_yaml)['vars']['gcs_bucket_local_mount'] }}"
  mounts:
  - "{{ (lookup('file', blueprint_yaml) | from_yaml)['vars']['gcs_bucket_local_mount'] }}"
  partitions:
  - rapid
