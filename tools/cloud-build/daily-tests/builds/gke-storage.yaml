---
tags:
- m.cloud-storage-bucket
- gcs-rapid
- anywhere-cache
- m.filestore
- m.gke-cluster
- m.service-account
- m.vpc
- gke

substitutions:
  _TEST_PREFIX: ""

timeout: 14400s  # 4hr
steps:
- id: check_for_running_build
  name: gcr.io/cloud-builders/gcloud
  script: "tools/cloud-build/check_running_build.sh tools/cloud-build/daily-tests/builds/gke-storage.yaml"

- id: gke-storage
  name: us-central1-docker.pkg.dev/$PROJECT_ID/hpc-toolkit-repo/test-runner
  entrypoint: /bin/bash
  env:
  - "ANSIBLE_HOST_KEY_CHECKING=false"
  - "ANSIBLE_CONFIG=/workspace/tools/cloud-build/ansible.cfg"
  args:
  - -c
  - |
    set -x -e
    cd /workspace
    if [ "${_TEST_PREFIX}" == "daily-" ]; then
        gsutil cp gs://$${GCLUSTER_GCS_PATH}/latest/gcluster-bundle.zip .
        unzip -o gcluster-bundle.zip
        chmod +x gcluster
    else
        make
    fi
    BUILD_ID_FULL=$BUILD_ID
    BUILD_ID_SHORT=$${BUILD_ID_FULL:0:6}
    SG_EXAMPLE=examples/storage-gke.yaml

    # Add remote-node and ensure N2 hardware for GCS Fuse performance
    echo '  - id: remote-node'                     >> $${SG_EXAMPLE}
    echo '    source: modules/compute/vm-instance' >> $${SG_EXAMPLE}
    echo '    use: [network1]'                     >> $${SG_EXAMPLE}
    echo '    settings:'                           >> $${SG_EXAMPLE}
    echo '      machine_type: n2-standard-4'       >> $${SG_EXAMPLE}
    echo '      zone: us-central1-b'               >> $${SG_EXAMPLE}

    # FIX: Generate the SSH keys so Ansible can authenticate with the VM
    mkdir -p /root/.ssh
    ssh-keygen -t rsa -f /root/.ssh/id_rsa -N "" -q
    chmod 600 /root/.ssh/id_rsa

    bash tools/add_ttl_label.sh "$${SG_EXAMPLE}"

    ansible-playbook tools/cloud-build/daily-tests/ansible_playbooks/base-integration-test.yml \
      --user=sa_106486320838376751393 --extra-vars="project=${PROJECT_ID} build=$${BUILD_ID_SHORT}" \
      --extra-vars="@tools/cloud-build/daily-tests/tests/gke-storage.yml"