---
tags: [dockerfile, m.pre-existing-vpc, m.vm-instance, vm]

substitutions:
  _TEST_PREFIX: "" # Default to no prefix

timeout: 3600s  # 1hr
steps:
- id: check_for_running_build
  name: us-central1-docker.pkg.dev/$PROJECT_ID/hpc-toolkit-repo/test-runner
  entrypoint: /bin/bash
  args:
  - -c
  - |
    set -e
    tools/cloud-build/check_running_build.sh \
      "tools/cloud-build/daily-tests/builds/gcluster-dockerfile.yaml" \
      "${_TEST_PREFIX}" \
      true

# uses a pre-built Google Cloud image containing Docker CLI tool.
- id: build-docker-image
  name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'gcluster', 'tools/cloud-build/images/cluster-toolkit-dockerfile/']

- id: modify-blueprint
  name: 'us-central1-docker.pkg.dev/$PROJECT_ID/hpc-toolkit-repo/test-runner' # Using an image with bash
  script: |
    #!/usr/bin/env bash
    set -ex
    BLUEPRINT="tools/cloud-build/daily-tests/blueprints/e2e.yaml"

    echo "--- Modifying Blueprint with add_ttl_label.sh ---"
    bash tools/add_ttl_label.sh "${BLUEPRINT}"

- id: create-deployment-folder
  name: 'gcluster'
  args:
  - 'create'
  - 'tools/cloud-build/daily-tests/blueprints/e2e.yaml'
  - '--out'
  - '/workspace'
  - '--vars'
  - 'project_id=$PROJECT_ID,deployment_name=dockerfile-test,region=us-central1,zone=us-central1-a'

- id: deploy-resources
  name: 'gcluster'
  args: ['deploy', '/workspace/dockerfile-test', '--auto-approve']

- id: check-on-resources
  name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
  automapSubstitutions: true
  script: |
    #!/usr/bin/env bash
    set -ex

    depl_name="dockerfile-test"
    zone="us-central1-a"

    # check instance was created
    gcloud compute instances describe "${depl_name}-0" --project="$PROJECT_ID" --zone="$zone" >/dev/null

- id: destroy-resources
  name: 'gcluster'
  args: ['destroy', '/workspace/dockerfile-test', '--auto-approve', '--robust']
