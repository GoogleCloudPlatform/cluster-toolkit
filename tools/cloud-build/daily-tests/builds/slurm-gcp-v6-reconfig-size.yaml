---
tags:
- m.pre-existing-vpc
- m.schedmd-slurm-gcp-v6-controller
- m.schedmd-slurm-gcp-v6-login
- m.schedmd-slurm-gcp-v6-nodeset
- m.schedmd-slurm-gcp-v6-partition
- slurm6

substitutions:
  _TEST_PREFIX: "" # Default to no prefix

timeout: 14400s  # 4hr
steps:
# While using static network names we are guarding against more than 1 instance running at a time (for multi-group tests)
- id: check_for_running_build
  name: us-central1-docker.pkg.dev/$PROJECT_ID/hpc-toolkit-repo/test-runner
  entrypoint: /bin/bash
  args:
  - -c
  - |
    set -e
    tools/cloud-build/check_running_build.sh \
      "tools/cloud-build/daily-tests/builds/slurm-gcp-v6-reconfig-size.yaml" \
      "${_TEST_PREFIX}" \
      true

- id: slurm-reconfig
  name: us-central1-docker.pkg.dev/$PROJECT_ID/hpc-toolkit-repo/test-runner
  entrypoint: /bin/bash
  args:
  - -c
  - |
    set -x -e
    cd /workspace && make
    export BUILD_ID="${BUILD_ID}"

    BP_BEFORE="tools/python-integration-tests/blueprints/slurm-reconfig-before.yaml"
    BP_AFTER="tools/python-integration-tests/blueprints/slurm-reconfig-after.yaml"

    # 2. Run the TTL script on both files
    bash tools/add_ttl_label.sh $$BP_BEFORE
    bash tools/add_ttl_label.sh $$BP_AFTER

    python3 tools/python-integration-tests/slurm_reconfig_size.py
